<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>星空Live情报站 — Taylor Swift & 薛之谦 全球巡演</title>
<style>
/* ============================================================
   CSS Variables & Reset — 深邃赛博配色
   ============================================================ */
:root {
  --bg-deep: #020205;
  --cyan: #00f0ff;
  --pink: #ff2d95;
  --purple: #7c3aed;
  --gold: #f59e0b;
  --green: #22c55e;
  --orange: #f97316;
  --red: #ef4444;
  --card-bg: rgba(10,10,25,0.75);
  --glass: rgba(255,255,255,0.04);
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --font-mono: 'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  --font-sans: 'Inter','SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg-deep);overflow:hidden;height:100vh}
body{
  font-family:var(--font-sans);color:var(--text);height:100vh;
  cursor:none;user-select:none;-webkit-font-smoothing:antialiased;
  overflow:hidden;
}

/* ── Three.js Canvas Background ─────────────────────────── */
#particle-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── Custom Cursor ──────────────────────────────────────── */
#cursor{
  position:fixed;z-index:9999;pointer-events:none;
  width:32px;height:32px;margin:-16px 0 0 -16px;
  border:2px solid rgba(255,255,255,0.6);border-radius:50%;
  mix-blend-mode:difference;transition:width 0.25s,height 0.25s,margin 0.25s,border-color 0.25s;
}
#cursor.hover-card{width:56px;height:56px;margin:-28px 0 0 -28px;border-color:var(--cyan)}
#cursor.hover-btn{width:48px;height:48px;margin:-24px 0 0 -24px;border-color:var(--pink)}

/* ── App Shell ──────────────────────────────────────────── */
#app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}

/* ── Nav ────────────────────────────────────────────────── */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 40px;z-index:10;
}
.logo{
  font-family:var(--font-mono);font-size:13px;letter-spacing:0.3em;
  color:var(--cyan);text-transform:uppercase;
  text-shadow:0 0 20px rgba(0,240,255,0.5);
}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{
  color:var(--text-dim);text-decoration:none;font-size:12px;
  letter-spacing:0.15em;text-transform:uppercase;transition:color 0.3s;
  cursor:none;
}
.nav-links a:hover{color:var(--pink);text-shadow:0 0 12px rgba(255,45,149,0.6)}

/* ── Hero / Countdown ────────────────────────────────────── */
#hero{
  display:flex;align-items:center;justify-content:center;gap:80px;
  padding:20px 40px;min-height:180px;z-index:5;
  background:linear-gradient(180deg,transparent 0%,rgba(0,240,255,0.02) 50%,transparent 100%);
}
.countdown-block{text-align:center}
.countdown-label{
  font-size:10px;letter-spacing:0.4em;color:var(--text-dim);text-transform:uppercase;margin-bottom:12px;
}
.countdown-digits{
  display:flex;gap:8px;justify-content:center;align-items:baseline;
}
.countdown-digit{
  font-family:var(--font-mono);font-size:72px;font-weight:700;line-height:1;
  background:linear-gradient(180deg,#fff 0%,var(--cyan) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:none;filter:drop-shadow(0 0 24px rgba(0,240,255,0.4));
  min-width:90px;text-align:center;
}
.countdown-unit{
  font-size:11px;color:var(--text-dim);letter-spacing:0.2em;text-transform:uppercase;
  margin-top:4px;
}
.countdown-sep{
  font-size:48px;color:rgba(255,255,255,0.2);padding-bottom:12px;
}
.next-concert-info{text-align:left}
.next-concert-tag{
  font-size:10px;letter-spacing:0.3em;color:var(--pink);text-transform:uppercase;
  display:inline-block;padding:4px 12px;border:1px solid rgba(255,45,149,0.3);
  border-radius:2px;margin-bottom:16px;
}
.next-concert-artist{font-size:28px;font-weight:700;margin-bottom:4px}
.next-concert-city{font-size:16px;color:var(--text-dim);margin-bottom:8px}
.next-concert-venue{font-size:13px;color:var(--text-dim);opacity:0.7}

.price-badge{
  display:inline-flex;align-items:center;gap:8px;margin-top:12px;
  padding:6px 16px;border-radius:2px;font-family:var(--font-mono);font-size:14px;
}
.price-badge.critical{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);color:var(--red)}
.price-badge.hot{background:rgba(249,115,22,0.15);border:1px solid rgba(249,115,22,0.4);color:var(--orange)}
.price-badge.warming{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.4);color:var(--gold)}
.price-badge.normal{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.4);color:var(--green)}
.price-badge.sold-out{background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.5);color:var(--purple)}

/* ── Carousel Section ────────────────────────────────────── */
#carousel-section{
  flex:1;display:flex;align-items:center;justify-content:center;
  perspective:1400px;perspective-origin:50% 40%;z-index:5;
  position:relative;
}
#carousel-stage{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  transform-style:preserve-3d;transition:transform 0.1s linear;
}
#carousel-ring{
  position:relative;transform-style:preserve-3d;
  transition:transform 0.8s cubic-bezier(0.23,1,0.32,1);
}
.carousel-hint{
  position:absolute;bottom:40px;left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:0.3em;color:var(--text-dim);
  display:flex;align-items:center;gap:8px;z-index:10;
}
.carousel-hint .arrows{color:var(--cyan);font-size:14px}

/* ── 3D Card ────────────────────────────────────────────── */
.concert-card{
  position:absolute;width:260px;height:360px;
  transform-style:preserve-3d;
  transition:transform 0.6s cubic-bezier(0.23,1,0.32,1);
  cursor:none;
}
.concert-card.flipped{transform:rotateY(180deg)}
.card-face{
  position:absolute;inset:0;backface-visibility:hidden;border-radius:8px;
  overflow:hidden;border:1px solid rgba(255,255,255,0.08);
}
.card-front{
  background:var(--card-bg);backdrop-filter:blur(20px);
  display:flex;flex-direction:column;padding:24px;
  box-shadow:0 8px 40px rgba(0,0,0,0.5);
}
.card-front::before{
  content:'';position:absolute;inset:0;border-radius:8px;
  background:radial-gradient(ellipse at 50% 0%,rgba(0,240,255,0.08) 0%,transparent 60%);
  pointer-events:none;
}
.card-front.taylor{border-top:3px solid var(--pink)}
.card-front.xue{border-top:3px solid var(--cyan)}

.card-artist-avatar{
  width:48px;height:48px;border-radius:50%;margin-bottom:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;color:#fff;
}
.card-artist-avatar.taylor{background:linear-gradient(135deg,var(--pink),#ec4899)}
.card-artist-avatar.xue{background:linear-gradient(135deg,var(--cyan),#3b82f6)}

.card-artist-name{font-size:16px;font-weight:700;margin-bottom:2px}
.card-tour-name{font-size:10px;color:var(--text-dim);margin-bottom:20px;letter-spacing:0.05em}

.card-city{font-size:22px;font-weight:700;margin-bottom:2px}
.card-country{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px}
.card-date{font-family:var(--font-mono);font-size:12px;color:var(--text-dim);margin-bottom:4px}
.card-venue{font-size:11px;color:var(--text-dim);opacity:0.7;margin-bottom:16px}

.card-tier-strip{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:16px;border-top:1px solid rgba(255,255,255,0.06);
}
.card-tier-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase}
.card-tier-price{font-family:var(--font-mono);font-size:18px;font-weight:700}
.card-sellout-bar{
  width:100%;height:2px;background:rgba(255,255,255,0.1);margin-top:auto;
  border-radius:1px;overflow:hidden;
}
.card-sellout-fill{height:100%;border-radius:1px;transition:width 0.6s}

/* Card Back */
.card-back{
  background:rgba(8,8,22,0.95);backdrop-filter:blur(20px);
  transform:rotateY(180deg);padding:28px 24px;
  display:flex;flex-direction:column;gap:14px;
  box-shadow:0 8px 40px rgba(0,0,0,0.5);
}
.card-back h3{font-size:13px;letter-spacing:0.2em;color:var(--cyan);text-transform:uppercase;margin-bottom:4px}
.card-back .info-row{display:flex;justify-content:space-between;align-items:center}
.card-back .info-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em}
.card-back .info-value{font-family:var(--font-mono);font-size:13px;text-align:right}
.card-back .countdown-mini{font-family:var(--font-mono);font-size:20px;color:var(--cyan);text-align:center;padding:12px;background:rgba(0,240,255,0.05);border-radius:4px}

/* Glitch text on hover */
@keyframes glitch1{0%,100%{transform:translate(0)}20%{transform:translate(-2px,1px)}40%{transform:translate(2px,-1px)}60%{transform:translate(-1px,-1px)}80%{transform:translate(1px,1px)}}
@keyframes glitch2{0%,100%{transform:translate(0)}20%{transform:translate(2px,-1px)}40%{transform:translate(-1px,2px)}60%{transform:translate(1px,1px)}80%{transform:translate(-2px,-1px)}}
.concert-card:hover .card-city{animation:glitch1 0.3s ease-in-out}
.concert-card:hover .card-artist-name{animation:glitch2 0.25s ease-in-out}

/* ── Dashboard Section ──────────────────────────────────── */
#dashboard{
  padding:20px 40px 30px;z-index:5;
  display:flex;gap:24px;justify-content:center;flex-wrap:wrap;
}
.stat-card{
  background:var(--glass);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.06);border-radius:6px;
  padding:18px 28px;min-width:140px;text-align:center;
  transition:border-color 0.3s,transform 0.3s;
}
.stat-card:hover{border-color:rgba(0,240,255,0.3);transform:translateY(-2px)}
.stat-value{font-family:var(--font-mono);font-size:28px;font-weight:700;color:var(--cyan)}
.stat-label{font-size:10px;color:var(--text-dim);letter-spacing:0.2em;text-transform:uppercase;margin-top:4px}

/* ── Artist tabs ────────────────────────────────────────── */
.artist-tabs{
  display:flex;gap:0;margin-bottom:16px;justify-content:center;
}
.artist-tab{
  padding:10px 28px;font-size:12px;letter-spacing:0.15em;color:var(--text-dim);
  background:transparent;border:1px solid rgba(255,255,255,0.08);cursor:none;
  transition:all 0.3s;font-family:var(--font-sans);
}
.artist-tab:first-child{border-radius:4px 0 0 4px}
.artist-tab:last-child{border-radius:0 4px 4px 0}
.artist-tab.active{background:rgba(0,240,255,0.1);color:var(--cyan);border-color:rgba(0,240,255,0.3)}

/* ── Responsive quick fixes ─────────────────────────────── */
@media(max-width:1024px){
  .countdown-digit{font-size:42px;min-width:50px}
  #hero{flex-direction:column;gap:24px;text-align:center}
  .next-concert-info{text-align:center}
  .concert-card{width:200px;height:290px}
  #dashboard{padding:12px 16px;gap:12px}
  .stat-card{padding:12px 18px;min-width:100px}
  .stat-value{font-size:20px}
}
</style>
</head>
<body>

<canvas id="particle-canvas"></canvas>
<div id="cursor"></div>

<div id="app">
  <nav>
    <div class="logo">◆ 星空Live情报站</div>
    <ul class="nav-links">
      <li><a href="#" data-artist="all" class="nav-filter active">全部艺人</a></li>
      <li><a href="#" data-artist="taylor-swift" class="nav-filter">Taylor Swift</a></li>
      <li><a href="#" data-artist="xue-zhiqian" class="nav-filter">薛之谦</a></li>
    </ul>
  </nav>

  <section id="hero">
    <div class="countdown-block">
      <div class="countdown-label">距离下一场演唱会</div>
      <div class="countdown-digits">
        <div><div class="countdown-digit" id="cd-days">00</div><div class="countdown-unit">天</div></div>
        <div class="countdown-sep">:</div>
        <div><div class="countdown-digit" id="cd-hours">00</div><div class="countdown-unit">时</div></div>
        <div class="countdown-sep">:</div>
        <div><div class="countdown-digit" id="cd-mins">00</div><div class="countdown-unit">分</div></div>
        <div class="countdown-sep">:</div>

    </div>
    <div class="carousel-hint">
      <span class="arrows">⟵</span> 滚轮旋转 · 点击卡片翻转 <span class="arrows">⟶</span>
    </div>
  </section>

  <section id="dashboard"></section>
</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
/* ================================================================
   STARLIGHT LIVE — 星空Live情报站 Frontend Engine
   Three.js 粒子星系 + CSS 3D 环形走马灯 + 实时倒计时 + 动态价格
   ================================================================ */

// ── DOM refs ──────────────────────────────────────────────
const $carouselRing = document.getElementById('carousel-ring');
const $dashboard = document.getElementById('dashboard');
const $nextInfo = document.getElementById('next-concert-info');
const $cursor = document.getElementById('cursor');
const $cdDays = document.getElementById('cd-days');
const $cdHours = document.getElementById('cd-hours');
const $cdMins = document.getElementById('cd-mins');
const $cdSecs = document.getElementById('cd-secs');

// ── State ─────────────────────────────────────────────────
let allConcerts = [];
let currentArtist = 'all';
let carouselAngle = 0;
let targetAngle = 0;
let countdownTarget = null;
let countdownInterval = null;

// ── API ───────────────────────────────────────────────────
const API = {
  async dashboard(){const r=await fetch('/api/ticket/dashboard');return r.json()},
  async countdown(artist){const p=artist?`?artist=${artist}`:'';const r=await fetch(`/api/ticket/countdown${p}`);return r.json()},
  async prices(artist){const p=artist?`?artist=${artist}`:'';const r=await fetch(`/api/ticket/price/all${p}`);return r.json()},
  async next(artist){const p=artist?`?artist=${artist}`:'';const r=await fetch(`/api/ticket/next${p}`);return r.json()},
};

/* ================================================================
   THREE.JS — 粒子星系背景
   ================================================================ */
function initParticleScene(){
  const canvas = document.getElementById('particle-canvas');
  const renderer = new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth,window.innerHeight);

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x020205,0.000035);

  const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,1,3000);
  camera.position.z = 800;

  // Spiral galaxy particles
  const COUNT = 3500;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(COUNT*3);
  const colors = new Float32Array(COUNT*3);
  const sizes = new Float32Array(COUNT);

  const arms = 3;
  const armSpread = 0.45;
  const centerColor = new THREE.Color('#00f0ff');
  const outerColor = new THREE.Color('#ff2d95');

  for(let i=0;i<COUNT;i++){
    const armIdx = i % arms;
    const baseAngle = (armIdx/arms)*Math.PI*2;
    const radius = 80 + Math.pow(Math.random(),1.5)*650;
    const spiralAngle = radius*0.008;
    const angle = baseAngle + spiralAngle + (Math.random()-0.5)*armSpread;
    const height = (Math.random()-0.5)*radius*0.4;

    positions[i*3] = Math.cos(angle)*radius;
    positions[i*3+1] = height;
    positions[i*3+2] = Math.sin(angle)*radius;

    const mix = radius/650;
    const col = centerColor.clone().lerp(outerColor,mix);
    colors[i*3]=col.r;colors[i*3+1]=col.g;colors[i*3+2]=col.b;
    sizes[i]=Math.random()*2.5+0.5;
  }

  geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
  geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
  geo.setAttribute('size',new THREE.BufferAttribute(sizes,1));

  // Glow sprite texture
  const glowCanvas = document.createElement('canvas');
  glowCanvas.width=64;glowCanvas.height=64;
  const ctx=glowCanvas.getContext('2d');
  const gradient=ctx.createRadialGradient(32,32,0,32,32,32);
  gradient.addColorStop(0,'rgba(255,255,255,1)');
  gradient.addColorStop(0.15,'rgba(255,255,255,0.8)');
  gradient.addColorStop(0.4,'rgba(100,200,255,0.3)');
  gradient.addColorStop(0.7,'rgba(0,0,0,0)');
  ctx.fillStyle=gradient;ctx.fillRect(0,0,64,64);
  const glowTex = new THREE.CanvasTexture(glowCanvas);

  const mat = new THREE.PointsMaterial({
    size:4.5,map:glowTex,blending:THREE.AdditiveBlending,
    depthWrite:false,vertexColors:true,transparent:true,opacity:0.8
  });

  const particles = new THREE.Points(geo,mat);
  scene.add(particles);

  // Floating accent particles (larger, fewer)
  const accentCount = 120;
  const accentGeo = new THREE.BufferGeometry();
  const accentPos = new Float32Array(accentCount*3);
  for(let i=0;i<accentCount;i++){
    accentPos[i*3]=(Math.random()-0.5)*1200;
    accentPos[i*3+1]=(Math.random()-0.5)*600;
    accentPos[i*3+2]=(Math.random()-0.5)*800;
  }
  accentGeo.setAttribute('position',new THREE.BufferAttribute(accentPos,3));
  const accentMat = new THREE.PointsMaterial({
    size:8,map:glowTex,blending:THREE.AdditiveBlending,
    depthWrite:false,color:0x00f0ff,transparent:true,opacity:0.5
  });
  const accents = new THREE.Points(accentGeo,accentMat);
  scene.add(accents);

  // Mouse tracking for subtle parallax
  let mouseX=0,mouseY=0,targetMX=0,targetMY=0;
  document.addEventListener('mousemove',e=>{
    targetMX=(e.clientX/window.innerWidth-0.5)*2;
    targetMY=(e.clientY/window.innerHeight-0.5)*2;
  });

  // Animate
  function animate(){
    requestAnimationFrame(animate);
    mouseX+=(targetMX-mouseX)*0.02;
    mouseY+=(targetMY-mouseY)*0.02;
    particles.rotation.y+=0.0003;
    particles.rotation.x+=0.0001;
    accents.rotation.y-=0.0004;
    accents.rotation.x+=0.0002;
    camera.position.x+=((mouseX*60)-camera.position.x)*0.02;
    camera.position.y+=((-mouseY*30)-camera.position.y)*0.02;
    camera.lookAt(scene.position);
    renderer.render(scene,camera);
  }
  animate();

  // Resize
  window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });
}

/* ================================================================
   CAROUSEL — CSS 3D 环形卡片阵列
   ================================================================ */
const CARD_W = 260, CARD_H = 360, CARD_GAP = 30;
const RADIUS = 620;

function buildCarousel(concerts){
  $carouselRing.innerHTML='';
  if(!concerts.length)return;

  const n = concerts.length;
  const angleStep = (Math.PI*2)/n;

  concerts.forEach((c,i)=>{
    const angle = angleStep*i;

    // Wrapper handles ring positioning (never animated by GSAP)
    const wrapper = document.createElement('div');
    wrapper.className = 'card-positioner';
    wrapper.style.cssText = `
      position:absolute;width:${CARD_W}px;height:${CARD_H}px;
      left:${-CARD_W/2}px;top:${-CARD_H/2}px;
      transform:rotateY(${angle}rad) translateZ(${RADIUS}px);
      transform-style:preserve-3d;
    `;

    // Inner card handles hover scale + flip (animated by GSAP)
    const card = document.createElement('div');
    card.className = 'concert-card';
    card.dataset.concertId = c.concertId;
    card.style.width = '100%';
    card.style.height = '100%';

    const isTaylor = c.artistName==='Taylor Swift';
    const avatarClass = isTaylor?'taylor':'xue';
    const price = c.currentPrice||0;
    const currency = c.currency||'USD';
    const sellout = c.sellOutRate||0;
    const tierColor = c.tierColor||'#22c55e';
    const tierZh = c.tierZh||'正常';

    const date = new Date(c.date);
    const dateStr = date.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});

    card.innerHTML = `
      <div class="card-face card-front ${isTaylor?'taylor':'xue'}">
        <div class="card-artist-avatar ${avatarClass}">${isTaylor?'TS':'薛'}</div>
        <div class="card-artist-name">${c.artistName}</div>
        <div class="card-tour-name">${isTaylor?'The Eras Tour':'天外来物 世界巡演'}</div>
        <div class="card-city">${c.cityZh||c.city}</div>
        <div class="card-country">${c.country||''}</div>
        <div class="card-date">${dateStr}</div>
        <div class="card-venue">${c.venueZh||c.venue}</div>
        <div class="card-sellout-bar"><div class="card-sellout-fill" style="width:${sellout}%;background:${tierColor}"></div></div>
        <div class="card-tier-strip">
          <span class="card-tier-label" style="color:${tierColor}">${tierZh}</span>
          <span class="card-tier-price" style="color:${tierColor}">${currency==='CNY'?'¥':'$'}${price}</span>
        </div>
      </div>
      <div class="card-face card-back">
        <h3>◆ 票务详情</h3>
        <div class="info-row"><span class="info-label">场馆</span><span class="info-value">${c.venueZh||c.venue}</span></div>
        <div class="info-row"><span class="info-label">容量</span><span class="info-value">${(c.capacity||0).toLocaleString()} 人</span></div>
        <div class="info-row"><span class="info-label">已售</span><span class="info-value">${(c.ticketsSold||0).toLocaleString()} 张</span></div>
        <div class="info-row"><span class="info-label">售罄率</span><span class="info-value" style="color:${tierColor}">${sellout}%</span></div>
        <div class="info-row"><span class="info-label">面值</span><span class="info-value">${currency==='CNY'?'¥':'$'}${c.faceValue||0}</span></div>
        <div class="info-row"><span class="info-label">现价</span><span class="info-value" style="color:${tierColor}">${currency==='CNY'?'¥':'$'}${price}</span></div>
        <div class="info-row"><span class="info-label">溢价</span><span class="info-value" style="color:${tierColor}">+${((c.multiplier||1)-1)*100|0}%</span></div>
        <div class="countdown-mini" data-target="${c.date}">加载中...</div>
      </div>
    `;

    // Click to flip
    card.addEventListener('click',(e)=>{
      e.stopPropagation();
      card.classList.toggle('flipped');
      // Update mini countdown on flip
      if(card.classList.contains('flipped')){
        updateMiniCountdown(card,c.date);
      }
    });

    // Hover effect
    card.addEventListener('mouseenter',()=>{
      $cursor.classList.add('hover-card');
      gsap.to(card,{duration:0.3,scale:1.06,ease:'power2.out',overwrite:true});
    });
    card.addEventListener('mouseleave',()=>{
      $cursor.classList.remove('hover-card');
      gsap.to(card,{duration:0.3,scale:1,ease:'power2.out',overwrite:true});
    });

    wrapper.appendChild(card);
    $carouselRing.appendChild(wrapper);
  });
}

function updateMiniCountdown(card,targetDate){
  const miniEl = card.querySelector('.countdown-mini');
  if(!miniEl)return;
  const diff = new Date(targetDate).getTime()-Date.now();
  if(diff<=0){miniEl.textContent='已开演';return}
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  miniEl.textContent = `倒计时 ${d}天 ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

/* ================================================================
   COUNTDOWN — 全局倒计时
   ================================================================ */
function drawCountdown(targetDate){
  if(!targetDate){$cdDays.textContent='--';$cdHours.textContent='--';$cdMins.textContent='--';$cdSecs.textContent='--';return}
  const diff=new Date(targetDate).getTime()-Date.now();
  if(diff<=0){$cdDays.textContent='00';$cdHours.textContent='00';$cdMins.textContent='00';$cdSecs.textContent='00';return}
  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff%86400000)/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  $cdDays.textContent=String(d).padStart(2,'0');
  $cdHours.textContent=String(h).padStart(2,'0');
  $cdMins.textContent=String(m).padStart(2,'0');
  $cdSecs.textContent=String(s).padStart(2,'0');
}

function startCountdown(targetDate){
  if(countdownInterval)clearInterval(countdownInterval);
  countdownTarget=targetDate;
  drawCountdown(targetDate);
  countdownInterval=setInterval(()=>drawCountdown(targetDate),1000);
}

/* ================================================================
   DASHBOARD — 数据面板
   ================================================================ */
function buildDashboard(dashboardData,prices){
  const d=dashboardData;
  let html='';
  if(d.byArtist){
    for(const [id,artist] of Object.entries(d.byArtist)){
      html+=`<div class="stat-card">
        <div class="stat-value">${artist.concertCount}</div>
        <div class="stat-label">${artist.nameZh} 剩余场次</div>
      </div>`;
      html+=`<div class="stat-card">
        <div class="stat-value">${artist.avgSellOutRate}%</div>
        <div class="stat-label">${artist.nameZh} 平均售罄率</div>
      </div>`;
    }
  }
  html+=`<div class="stat-card">
    <div class="stat-value" style="color:var(--pink)">${d.soldOutCount||0}</div>
    <div class="stat-label">已售罄场次</div>
  </div>`;
  html+=`<div class="stat-card">
    <div class="stat-value" style="color:var(--gold)">${(d.totalSold||0).toLocaleString()}</div>
    <div class="stat-label">已售出门票</div>
  </div>`;
  $dashboard.innerHTML=html;
}

/* ================================================================
   NEXT CONCERT INFO — 最近一场信息
   ================================================================ */
function buildNextInfo(priceData){
  if(!priceData||priceData.error){$nextInfo.innerHTML='';return}
  const c=priceData;
  const tierClassMap={critical:'critical',hot:'hot',warming:'warming',normal:'normal','sold-out':'sold-out'};
  const tierClass=tierClassMap[c.tier]||'normal';
  const date=new Date(c.date);
  $nextInfo.innerHTML=`
    <div class="next-concert-tag">◆ NEXT CONCERT</div>
    <div class="next-concert-artist">${c.artistNameZh||c.artistName}</div>
    <div class="next-concert-city">${c.cityZh||c.city} · ${date.toLocaleDateString('zh-CN',{month:'long',day:'numeric'})}</div>
    <div class="next-concert-venue">${c.venueZh||c.venue}</div>
    <div class="price-badge ${tierClass}">
      ${c.trendEmoji||''} ${c.tierZh} · ${c.currency==='CNY'?'¥':'$'}${c.currentPrice}
      <span style="font-size:11px;opacity:0.7">(+${c.premium||0}%)</span>
    </div>
  `;
}

/* ================================================================
   SCROLL HANDLING — 滚轮驱动环形旋转
   ================================================================ */
function initScrollHandler(){
  document.addEventListener('wheel',(e)=>{
    e.preventDefault();
    targetAngle+=e.deltaY*0.002;
    carouselAngle+=(targetAngle-carouselAngle)*0.1;
    $carouselRing.style.transform=`rotateY(${carouselAngle}rad)`;
  },{passive:false});

  // Touch support
  let touchY=0;
  document.addEventListener('touchstart',e=>{touchY=e.touches[0].clientY},{passive:false});
  document.addEventListener('touchmove',e=>{
    e.preventDefault();
    const dy=touchY-e.touches[0].clientY;
    targetAngle+=dy*0.003;
    carouselAngle+=(targetAngle-carouselAngle)*0.1;
    $carouselRing.style.transform=`rotateY(${carouselAngle}rad)`;
    touchY=e.touches[0].clientY;
  },{passive:false});
}

/* ================================================================
   CUSTOM CURSOR — 自定义光标
   ================================================================ */
function initCursor(){
  let cx=window.innerWidth/2,cy=window.innerHeight/2;
  let tx=cx,ty=cy;
  document.addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY});
  // Add hover detection for nav links
  document.querySelectorAll('a, button, .artist-tab').forEach(el=>{
    el.addEventListener('mouseenter',()=>$cursor.classList.add('hover-btn'));
    el.addEventListener('mouseleave',()=>$cursor.classList.remove('hover-btn'));
  });
  function updateCursor(){
    cx+=(tx-cx)*0.2;cy+=(ty-cy)*0.2;
    $cursor.style.left=cx+'px';$cursor.style.top=cy+'px';
    requestAnimationFrame(updateCursor);
  }
  updateCursor();
}

/* ================================================================
   NAV FILTERS — 艺人筛选
   ================================================================ */
function initNavFilters(){
  document.querySelectorAll('.nav-filter').forEach(link=>{
    link.addEventListener('click',async e=>{
      e.preventDefault();
      document.querySelectorAll('.nav-filter').forEach(l=>l.classList.remove('active'));
      link.classList.add('active');
      currentArtist=link.dataset.artist;
      await loadData(currentArtist==='all'?null:currentArtist);
    });
  });
}

/* ================================================================
   DATA LOADER — 主数据加载
   ================================================================ */
async function loadData(artist){
  try{
    const [dashboardData,countdownData,prices] = await Promise.all([
      API.dashboard(),
      API.countdown(artist),
      API.prices(artist)
    ]);

    allConcerts = prices;
    buildCarousel(prices);
    buildDashboard(dashboardData,prices);
    buildNextInfo(prices.length>0?prices[0]:null);
    if(countdownData.concert?.date){
      startCountdown(countdownData.concert.date);
    }
    // Update all mini countdowns
    document.querySelectorAll('.countdown-mini').forEach(el=>{
      const target=el.dataset.target;
      if(target)updateMiniCountdown(el.closest('.concert-card'),target);
    });

    console.log(`[星空Live] ✅ 已加载 ${prices.length} 场演唱会数据`);
  }catch(err){
    console.error('[星空Live] 数据加载失败:',err);
  }
}

/* ================================================================
   INIT — 启动
   ================================================================ */
async function init(){
  initParticleScene();
  initScrollHandler();
  initCursor();
  initNavFilters();
  await loadData(null);

  // Periodic data refresh (every 60s for dynamic prices)
  setInterval(async()=>{
    const prices=await API.prices(currentArtist==='all'?null:currentArtist);
    allConcerts=prices;
    buildCarousel(prices);
  },60000);

  // Update mini countdowns every 30s
  setInterval(()=>{
    document.querySelectorAll('.concert-card.flipped .countdown-mini').forEach(el=>{
      const target=el.dataset.target;
      if(target)updateMiniCountdown(el.closest('.concert-card'),target);
    });
  },30000);

  console.log('🚀 星空Live情报站 · Active Theory Edition · 已就绪');
}

init();
</script>
