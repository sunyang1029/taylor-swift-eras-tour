<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>星空Live情报站 — Taylor Swift & 薛之谦 全球巡演</title>
<style>
/* ============================================================
   CSS — 深邃赛博配色 + Active Theory 风格
   ============================================================ */
:root {
  --bg-deep: #020205;
  --cyan: #00f0ff;
  --pink: #ff2d95;
  --purple: #7c3aed;
  --gold: #f59e0b;
  --green: #22c55e;
  --orange: #f97316;
  --red: #ef4444;
  --card-bg: rgba(10,10,25,0.75);
  --glass: rgba(255,255,255,0.04);
  --text: #e2e8f0;
  --text-dim: #94a3b8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg-deep);overflow:hidden;height:100vh}
body{
  font-family:'Inter','SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif;
  color:var(--text);height:100vh;
  cursor:none;user-select:none;-webkit-font-smoothing:antialiased;
  overflow:hidden;
}

/* ── Three.js Canvas ────────────────────────────────────── */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── Custom Cursor ──────────────────────────────────────── */
#cursor{
  position:fixed;z-index:9999;pointer-events:none;
  width:32px;height:32px;margin:-16px 0 0 -16px;
  border:2px solid rgba(255,255,255,0.6);border-radius:50%;
  mix-blend-mode:difference;
  transition:width 0.25s,height 0.25s,margin 0.25s,border-color 0.25s;
}
#cursor.hover-card{width:56px;height:56px;margin:-28px 0 0 -28px;border-color:var(--cyan)}
#cursor.hover-btn{width:48px;height:48px;margin:-24px 0 0 -24px;border-color:var(--pink)}

/* ── App Shell ──────────────────────────────────────────── */
#app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}

/* ── Nav ────────────────────────────────────────────────── */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 40px;z-index:10;flex-shrink:0;
}
.logo{
  font-family:'JetBrains Mono','Fira Code','Courier New',monospace;
  font-size:13px;letter-spacing:0.3em;color:var(--cyan);text-transform:uppercase;
  text-shadow:0 0 20px rgba(0,240,255,0.5);
}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{
  color:var(--text-dim);text-decoration:none;font-size:11px;
  letter-spacing:0.15em;text-transform:uppercase;transition:color 0.3s;
  cursor:none;padding:4px 0;border-bottom:2px solid transparent;
}
.nav-links a:hover,.nav-links a.active{color:var(--pink);border-bottom-color:var(--pink);text-shadow:0 0 12px rgba(255,45,149,0.6)}

/* ── Hero / Countdown ────────────────────────────────────── */
#hero{
  display:flex;align-items:center;justify-content:center;gap:80px;
  padding:8px 40px;min-height:150px;z-index:5;flex-shrink:0;
  background:linear-gradient(180deg,transparent 0%,rgba(0,240,255,0.015) 50%,transparent 100%);
}
.countdown-block{text-align:center}
.countdown-label{font-size:10px;letter-spacing:0.4em;color:var(--text-dim);text-transform:uppercase;margin-bottom:10px}
.countdown-digits{display:flex;gap:6px;justify-content:center;align-items:baseline}
.countdown-digit{
  font-family:'JetBrains Mono','Fira Code',monospace;
  font-size:68px;font-weight:700;line-height:1;
  background:linear-gradient(180deg,#fff 0%,var(--cyan) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 0 20px rgba(0,240,255,0.4));
  min-width:82px;text-align:center;
}
.countdown-unit{font-size:10px;color:var(--text-dim);letter-spacing:0.2em;text-transform:uppercase;margin-top:4px}
.countdown-sep{font-size:42px;color:rgba(255,255,255,0.15);padding-bottom:10px}
.next-concert-info{text-align:left;min-width:240px}
.next-concert-tag{
  font-size:9px;letter-spacing:0.3em;color:var(--pink);text-transform:uppercase;
  display:inline-block;padding:3px 10px;border:1px solid rgba(255,45,149,0.3);
  border-radius:2px;margin-bottom:12px;
}
.next-concert-artist{font-size:26px;font-weight:700;margin-bottom:3px}
.next-concert-city{font-size:15px;color:var(--text-dim);margin-bottom:6px}
.next-concert-venue{font-size:12px;color:var(--text-dim);opacity:0.7}
.price-badge{
  display:inline-flex;align-items:center;gap:6px;margin-top:10px;
  padding:5px 14px;border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:13px;
}
.price-badge.critical{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);color:var(--red)}
.price-badge.hot{background:rgba(249,115,22,0.15);border:1px solid rgba(249,115,22,0.4);color:var(--orange)}
.price-badge.warming{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.4);color:var(--gold)}
.price-badge.normal{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.4);color:var(--green)}
.price-badge.sold-out{background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.5);color:var(--purple);animation:glowPulse 1.5s infinite alternate}
@keyframes glowPulse{0%{box-shadow:0 0 4px rgba(124,58,237,0.3)}100%{box-shadow:0 0 16px rgba(124,58,237,0.6)}}

/* ── Carousel ────────────────────────────────────────────── */
#carousel-section{
  flex:1;display:flex;align-items:center;justify-content:center;
  perspective:1400px;perspective-origin:50% 40%;z-index:5;
  position:relative;min-height:300px;
}
#carousel-stage{width:100%;height:100%;display:flex;align-items:center;justify-content:center;transform-style:preserve-3d}
#carousel-ring{position:relative;transform-style:preserve-3d;width:0;height:0}
.carousel-hint{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  font-size:9px;letter-spacing:0.25em;color:var(--text-dim);
  display:flex;align-items:center;gap:6px;z-index:10;opacity:0.7;
}
.carousel-hint .arrows{color:var(--cyan);font-size:12px}

/* ── Card ────────────────────────────────────────────────── */
.card-positioner{position:absolute;transform-style:preserve-3d;pointer-events:auto}
.concert-card{
  width:100%;height:100%;transform-style:preserve-3d;
  transition:transform 0.6s cubic-bezier(0.23,1,0.32,1);
  cursor:none;
}
.concert-card.flipped{transform:rotateY(180deg)}
/* CSS hover fallback (when GSAP unavailable) */
.card-positioner:hover .concert-card:not(.flipped){box-shadow:0 0 35px rgba(0,240,255,0.15)}

.card-face{
  position:absolute;inset:0;backface-visibility:hidden;border-radius:8px;
  overflow:hidden;border:1px solid rgba(255,255,255,0.08);
}
.card-front{
  background:var(--card-bg);backdrop-filter:blur(20px);
  display:flex;flex-direction:column;padding:20px 18px;
  box-shadow:0 8px 40px rgba(0,0,0,0.5);
}
.card-front::before{
  content:'';position:absolute;inset:0;border-radius:8px;
  background:radial-gradient(ellipse at 50% 0%,rgba(0,240,255,0.06) 0%,transparent 60%);
  pointer-events:none;
}
.card-front.taylor{border-top:3px solid var(--pink)}
.card-front.xue{border-top:3px solid var(--cyan)}
.card-artist-avatar{
  width:40px;height:40px;border-radius:50%;margin-bottom:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#fff;flex-shrink:0;
}
.card-artist-avatar.taylor{background:linear-gradient(135deg,var(--pink),#ec4899);box-shadow:0 0 16px rgba(255,45,149,0.3)}
.card-artist-avatar.xue{background:linear-gradient(135deg,var(--cyan),#3b82f6);box-shadow:0 0 16px rgba(0,240,255,0.3)}
.card-artist-name{font-size:14px;font-weight:700;margin-bottom:1px}
.card-tour-name{font-size:8px;color:var(--text-dim);margin-bottom:14px;letter-spacing:0.04em}
.card-city{font-size:19px;font-weight:700;margin-bottom:1px}
.card-country{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.card-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);margin-bottom:2px}
.card-venue{font-size:9px;color:var(--text-dim);opacity:0.7;margin-bottom:10px}
.card-sellout-bar{width:100%;height:2px;background:rgba(255,255,255,0.08);margin-top:auto;margin-bottom:8px;border-radius:1px;overflow:hidden}
.card-sellout-fill{height:100%;border-radius:1px;transition:width 0.6s}
.card-tier-strip{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06)}
.card-tier-label{font-size:8px;letter-spacing:0.2em;text-transform:uppercase}
.card-tier-price{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700}

/* Card Back */
.card-back{
  background:rgba(8,8,22,0.96);backdrop-filter:blur(20px);
  transform:rotateY(180deg);padding:22px 18px;
  display:flex;flex-direction:column;gap:8px;
  box-shadow:0 8px 40px rgba(0,0,0,0.5);
}
.card-back h3{font-size:11px;letter-spacing:0.2em;color:var(--cyan);text-transform:uppercase;margin-bottom:2px}
.card-back .info-row{display:flex;justify-content:space-between;align-items:center}
.card-back .info-label{font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em}
.card-back .info-value{font-family:'JetBrains Mono',monospace;font-size:11px;text-align:right}
.card-back .countdown-mini{
  font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--cyan);
  text-align:center;padding:8px;background:rgba(0,240,255,0.04);border-radius:4px;margin-top:4px;
}

/* Glitch hover */
.concert-card:hover .card-city{animation:glitch1 0.3s ease-in-out}
.concert-card:hover .card-artist-name{animation:glitch2 0.25s ease-in-out}
@keyframes glitch1{0%,100%{transform:translate(0)}20%{transform:translate(-2px,1px)}40%{transform:translate(2px,-1px)}60%{transform:translate(-1px,-1px)}80%{transform:translate(1px,1px)}}
@keyframes glitch2{0%,100%{transform:translate(0)}20%{transform:translate(2px,-1px)}40%{transform:translate(-1px,2px)}60%{transform:translate(1px,1px)}80%{transform:translate(-2px,-1px)}}

/* ── Dashboard ──────────────────────────────────────────── */
#dashboard{
  padding:14px 40px 22px;z-index:5;flex-shrink:0;
  display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
}
.stat-card{
  background:var(--glass);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.06);border-radius:6px;
  padding:14px 22px;min-width:120px;text-align:center;
  transition:border-color 0.3s,transform 0.3s;
}
.stat-card:hover{border-color:rgba(0,240,255,0.3);transform:translateY(-2px)}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--cyan)}
.stat-label{font-size:8px;color:var(--text-dim);letter-spacing:0.2em;text-transform:uppercase;margin-top:4px}

/* ── Responsive ─────────────────────────────────────────── */
@media(max-width:1024px){
  .countdown-digit{font-size:40px;min-width:50px}
  #hero{flex-direction:column;gap:16px;text-align:center;padding:8px 16px}
  .next-concert-info{text-align:center}
  #dashboard{padding:8px 16px;gap:8px}
  .stat-card{padding:8px 14px;min-width:80px}
  .stat-value{font-size:18px}
  nav{padding:12px 16px}
  .nav-links{gap:16px}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="cursor"></div>

<div id="app">
  <nav>
    <div class="logo">◆ 星空Live情报站</div>
    <ul class="nav-links">
      <li><a href="#" data-artist="all" class="nav-filter active">全部</a></li>
      <li><a href="#" data-artist="taylor-swift" class="nav-filter">Taylor Swift</a></li>
      <li><a href="#" data-artist="xue-zhiqian" class="nav-filter">薛之谦</a></li>
    </ul>
  </nav>

  <section id="hero">
    <div class="countdown-block">
      <div class="countdown-label">距离下一场演唱会</div>
      <div class="countdown-digits">
        <div><div class="countdown-digit" id="cd-days">--</div><div class="countdown-unit">天</div></div>
        <div class="countdown-sep">:</div>
        <div><div class="countdown-digit" id="cd-hours">--</div><div class="countdown-unit">时</div></div>
        <div class="countdown-sep">:</div>
        <div><div class="countdown-digit" id="cd-mins">--</div><div class="countdown-unit">分</div></div>
        <div class="countdown-sep">:</div>

      </div>

    <div class="next-concert-info" id="next-concert-info">
      <div style="color:var(--text-dim);font-size:12px">连接票务网络中...</div>
    </div>
  </section>

  <section id="carousel-section">
    <div id="carousel-stage"><div id="carousel-ring"></div></div>

    </div>
  </section>

  <section id="dashboard">
    <div class="stat-card"><div class="stat-value">...</div><div class="stat-label">加载中</div></div>
  </section>
</div>

<!-- ============================================================
     LOCAL LIBRARIES — served by Express, zero CDN dependency
     ============================================================ -->
<script src="/lib/three.min.js"></script>
<script src="/lib/gsap.min.js"></script>

<script>
/* ================================================================
   STARLIGHT LIVE v4 — Local libs + Three.js 粒子星系 + GSAP 动画
   ================================================================ */
(function(){
'use strict';

// ── DOM ───────────────────────────────────────────────────
var $R = document.getElementById('carousel-ring');
var $DB = document.getElementById('dashboard');
var $NI = document.getElementById('next-concert-info');
var $CR = document.getElementById('cursor');
var $DD = document.getElementById('cd-days');
var $DH = document.getElementById('cd-hours');
var $DM = document.getElementById('cd-mins');
var $DS = document.getElementById('cd-secs');

// ── State ─────────────────────────────────────────────────
var allConcerts = [];
var currentArtist = 'all';
var carAngle = 0, targetCarAngle = 0;
var countdownTimer = null;
var gsapOk = (typeof gsap !== 'undefined');
var threeOk = (typeof THREE !== 'undefined');

console.log('[Boot] GSAP:', gsapOk?'OK':'missing', '| THREE:', threeOk?'OK':'missing');

// ── API ───────────────────────────────────────────────────
function apiGet(path){
  return fetch(path, {cache:'no-cache'}).then(function(r){
    if(!r.ok) throw new Error(path+' HTTP '+r.status);
    return r.json();
  });
}
var API = {
  dashboard: function(){ return apiGet('/api/ticket/dashboard'); },
  countdown: function(a){ return apiGet('/api/ticket/countdown'+(a?'?artist='+a:'')); },
  prices: function(a){ return apiGet('/api/ticket/price/all'+(a?'?artist='+a:'')); }
};

/* ================================================================
   THREE.JS — 粒子星系 (本地库)
   ================================================================ */
function initThreeScene(){
  if(!threeOk){
    console.warn('[3D] THREE not available');
    return;
  }
  try {
    var canvas = document.getElementById('bg-canvas');
    var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true, alpha:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    var scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x020205, 0.000035);
    var camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 3000);
    camera.position.z = 800;

    var COUNT = 3000;
    var geo = new THREE.BufferGeometry();
    var positions = new Float32Array(COUNT * 3);
    var colors = new Float32Array(COUNT * 3);

    for(var i = 0; i < COUNT; i++){
      var armIdx = i % 3;
      var baseAngle = (armIdx / 3) * Math.PI * 2;
      var radius = 80 + Math.pow(Math.random(), 1.5) * 650;
      var spiralAngle = radius * 0.008;
      var angle = baseAngle + spiralAngle + (Math.random() - 0.5) * 0.45;
      var height = (Math.random() - 0.5) * radius * 0.4;

      positions[i*3] = Math.cos(angle) * radius;
      positions[i*3+1] = height;
      positions[i*3+2] = Math.sin(angle) * radius;

      var mix = radius / 650;
      colors[i*3] = 0.0 + mix * 1.0;       // R: 0→1 (black→pink)
      colors[i*3+1] = 0.94 * (1-mix);      // G: cyan→0
      colors[i*3+2] = 1.0 * (1-mix) + mix * 0.58; // B: cyan→pink
    }

    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    // Glow texture
    var gc = document.createElement('canvas'); gc.width = 64; gc.height = 64;
    var gctx = gc.getContext('2d');
    var grad = gctx.createRadialGradient(32,32,0,32,32,32);
    grad.addColorStop(0,'rgba(255,255,255,1)');
    grad.addColorStop(0.15,'rgba(255,255,255,0.8)');
    grad.addColorStop(0.4,'rgba(100,200,255,0.3)');
    grad.addColorStop(0.7,'rgba(0,0,0,0)');
    gctx.fillStyle = grad; gctx.fillRect(0,0,64,64);
    var glowTex = new THREE.CanvasTexture(gc);

    var mat = new THREE.PointsMaterial({
      size: 4.5, map: glowTex,
      blending: THREE.AdditiveBlending, depthWrite: false,
      vertexColors: true, transparent: true, opacity: 0.8
    });
    var particles = new THREE.Points(geo, mat);
    scene.add(particles);

    // Accent particles
    var ac = 100;
    var ageo = new THREE.BufferGeometry();
    var apos = new Float32Array(ac * 3);
    for(var j = 0; j < ac; j++){
      apos[j*3] = (Math.random()-0.5)*1200;
      apos[j*3+1] = (Math.random()-0.5)*600;
      apos[j*3+2] = (Math.random()-0.5)*800;
    }
    ageo.setAttribute('position', new THREE.BufferAttribute(apos, 3));
    var amat = new THREE.PointsMaterial({
      size: 8, map: glowTex, blending: THREE.AdditiveBlending,
      depthWrite: false, color: 0x00f0ff, transparent: true, opacity: 0.4
    });
    var accents = new THREE.Points(ageo, amat);
    scene.add(accents);

    // Mouse parallax
    var mx = 0, my = 0, tmx = 0, tmy = 0;
    document.addEventListener('mousemove', function(e){
      tmx = (e.clientX / window.innerWidth - 0.5) * 2;
      tmy = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    function animate(){
      requestAnimationFrame(animate);
      mx += (tmx - mx) * 0.02;
      my += (tmy - my) * 0.02;
      particles.rotation.y += 0.0003;
      particles.rotation.x += 0.0001;
      accents.rotation.y -= 0.0004;
      accents.rotation.x += 0.0002;
      camera.position.x += (mx * 60 - camera.position.x) * 0.02;
      camera.position.y += (-my * 30 - camera.position.y) * 0.02;
      camera.lookAt(scene.position);
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', function(){
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    console.log('[3D] 粒子星系就绪 —', COUNT, 'stars');
  } catch(e){
    console.error('[3D] 初始化失败:', e.message);
  }
}

/* ================================================================
   CAROUSEL — CSS 3D 环形卡片阵列
   ================================================================ */
var CARD_W = 260, CARD_H = 360, RADIUS = 600;

function buildCarousel(concerts){
  $R.innerHTML = '';
  if(!concerts || !concerts.length){
    $R.innerHTML = '<div style="color:var(--text-dim);font-size:13px;white-space:nowrap;letter-spacing:0.2em">◆ 暂无巡演数据 ◆</div>';
    return;
  }

  var n = concerts.length;
  var step = (Math.PI * 2) / n;

  concerts.forEach(function(c, i){
    var angle = step * i;

    var wrapper = document.createElement('div');
    wrapper.className = 'card-positioner';
    wrapper.style.cssText = 'width:'+CARD_W+'px;height:'+CARD_H+'px;left:'+(-CARD_W/2)+'px;top:'+(-CARD_H/2)+'px;transform:rotateY('+angle+'rad) translateZ('+RADIUS+'px)';

    var card = document.createElement('div');
    card.className = 'concert-card';
    card.dataset.concertId = c.concertId;

    var isTS = c.artistName === 'Taylor Swift';
    var avCls = isTS ? 'taylor' : 'xue';
    var price = c.currentPrice || 0;
    var cur = c.currency || 'USD';
    var so = c.sellOutRate || 0;
    var tc = c.tierColor || '#22c55e';
    var tz = c.tierZh || '正常';
    var d = new Date(c.date);
    var ds = d.toLocaleDateString('zh-CN', {year:'numeric', month:'long', day:'numeric'});

    card.innerHTML =
      '<div class="card-face card-front '+(isTS?'taylor':'xue')+'">'+
        '<div class="card-artist-avatar '+avCls+'">'+(isTS?'TS':'薛')+'</div>'+
        '<div class="card-artist-name">'+c.artistName+'</div>'+
        '<div class="card-tour-name">'+(isTS?'The Eras Tour':'天外来物 世界巡演')+'</div>'+
        '<div class="card-city">'+(c.cityZh||c.city)+'</div>'+
        '<div class="card-country">'+(c.country||'')+'</div>'+
        '<div class="card-date">'+ds+'</div>'+
        '<div class="card-venue">'+(c.venueZh||c.venue)+'</div>'+
        '<div class="card-sellout-bar"><div class="card-sellout-fill" style="width:'+so+'%;background:'+tc+'"></div></div>'+
        '<div class="card-tier-strip">'+
          '<span class="card-tier-label" style="color:'+tc+'">'+tz+'</span>'+
          '<span class="card-tier-price" style="color:'+tc+'">'+(cur==='CNY'?'¥':'$')+price+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="card-face card-back">'+
        '<h3>◆ 票务详情</h3>'+
        '<div class="info-row"><span class="info-label">场馆</span><span class="info-value">'+(c.venueZh||c.venue)+'</span></div>'+
        '<div class="info-row"><span class="info-label">容量</span><span class="info-value">'+(c.capacity||0).toLocaleString()+' 人</span></div>'+
        '<div class="info-row"><span class="info-label">已售</span><span class="info-value">'+(c.ticketsSold||0).toLocaleString()+' 张</span></div>'+
        '<div class="info-row"><span class="info-label">售罄率</span><span class="info-value" style="color:'+tc+'">'+so+'%</span></div>'+
        '<div class="info-row"><span class="info-label">面值</span><span class="info-value">'+(cur==='CNY'?'¥':'$')+(c.faceValue||0)+'</span></div>'+
        '<div class="info-row"><span class="info-label">现价</span><span class="info-value" style="color:'+tc+'">'+(cur==='CNY'?'¥':'$')+price+'</span></div>'+
        '<div class="info-row"><span class="info-label">溢价</span><span class="info-value" style="color:'+tc+'">+'+(((c.multiplier||1)-1)*100|0)+'%</span></div>'+
        '<div class="countdown-mini" data-target="'+c.date+'">加载中...</div>'+
      '</div>';

    card.addEventListener('click', function(e){
      e.stopPropagation();
      card.classList.toggle('flipped');
      if(card.classList.contains('flipped')) updateMiniCD(card, c.date);
    });

    card.addEventListener('mouseenter', function(){
      $CR.classList.add('hover-card');
      if(gsapOk) gsap.to(card, {duration:0.3, scale:1.06, ease:'power2.out', overwrite:true});
    });
    card.addEventListener('mouseleave', function(){
      $CR.classList.remove('hover-card');
      if(gsapOk) gsap.to(card, {duration:0.3, scale:1, ease:'power2.out', overwrite:true});
    });

    wrapper.appendChild(card);
    $R.appendChild(wrapper);
  });
}

function updateMiniCD(card, targetDate){
  var el = card.querySelector('.countdown-mini');
  if(!el) return;
  var diff = new Date(targetDate).getTime() - Date.now();
  if(diff <= 0){ el.textContent = '已开演'; return; }
  var d = Math.floor(diff / 86400000);
  var h = Math.floor((diff % 86400000) / 3600000);
  var m = Math.floor((diff % 3600000) / 60000);
  el.textContent = '倒计时 ' + d + '天 ' + String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
}

/* ================================================================
   COUNTDOWN
   ================================================================ */
function drawCD(targetDate){
  if(!targetDate){ $DD.textContent='--';$DH.textContent='--';$DM.textContent='--';$DS.textContent='--'; return; }
  var diff = new Date(targetDate).getTime() - Date.now();
  if(diff <= 0){ $DD.textContent='00';$DH.textContent='00';$DM.textContent='00';$DS.textContent='00'; return; }
  $DD.textContent = String(Math.floor(diff / 86400000)).padStart(2,'0');
  $DH.textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2,'0');
  $DM.textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
  $DS.textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
}

function startCD(targetDate){
  if(countdownTimer) clearInterval(countdownTimer);
  drawCD(targetDate);
  countdownTimer = setInterval(function(){ drawCD(targetDate); }, 1000);
}

/* ================================================================
   DASHBOARD
   ================================================================ */
function buildDB(d){
  if(!d){ $DB.innerHTML = ''; return; }
  var h = '';
  if(d.byArtist){
    for(var key in d.byArtist){
      var a = d.byArtist[key];
      h += '<div class="stat-card"><div class="stat-value">'+a.concertCount+'</div><div class="stat-label">'+a.nameZh+' 剩余场次</div></div>';
      h += '<div class="stat-card"><div class="stat-value">'+a.avgSellOutRate+'%</div><div class="stat-label">'+a.nameZh+' 平均售罄率</div></div>';
    }
  }
  h += '<div class="stat-card"><div class="stat-value" style="color:var(--pink)">'+(d.soldOutCount||0)+'</div><div class="stat-label">已售罄场次</div></div>';
  h += '<div class="stat-card"><div class="stat-value" style="color:var(--gold)">'+(d.totalSold||0).toLocaleString()+'</div><div class="stat-label">已售出门票</div></div>';
  $DB.innerHTML = h;
}

function buildNI(c){
  if(!c || c.error){ $NI.innerHTML = '<div style="color:var(--text-dim);font-size:12px">暂无即将开演场次</div>'; return; }
  var map = {critical:'critical', hot:'hot', warming:'warming', normal:'normal', 'sold-out':'sold-out'};
  var cls = map[c.tier] || 'normal';
  var d = new Date(c.date);
  $NI.innerHTML =
    '<div class="next-concert-tag">◆ NEXT CONCERT</div>'+
    '<div class="next-concert-artist">'+(c.artistNameZh||c.artistName)+'</div>'+
    '<div class="next-concert-city">'+(c.cityZh||c.city)+' · '+d.toLocaleDateString('zh-CN',{month:'long',day:'numeric'})+'</div>'+
    '<div class="next-concert-venue">'+(c.venueZh||c.venue)+'</div>'+
    '<div class="price-badge '+cls+'">'+(c.trendEmoji||'')+' '+c.tierZh+' · '+(c.currency==='CNY'?'¥':'$')+c.currentPrice+
      ' <span style="font-size:10px;opacity:0.7">(+'+(c.premium||0)+'%)</span></div>';
}

/* ================================================================
   SCROLL
   ================================================================ */
function initScroll(){
  document.addEventListener('wheel', function(e){
    e.preventDefault();
    targetCarAngle += e.deltaY * 0.002;
    carAngle += (targetCarAngle - carAngle) * 0.1;
    $R.style.transform = 'rotateY('+carAngle+'rad)';
  }, {passive: false});

  var ty = 0;
  document.addEventListener('touchstart', function(e){ ty = e.touches[0].clientY; }, {passive: false});
  document.addEventListener('touchmove', function(e){
    e.preventDefault();
    var dy = ty - e.touches[0].clientY;
    targetCarAngle += dy * 0.003;
    carAngle += (targetCarAngle - carAngle) * 0.1;
    $R.style.transform = 'rotateY('+carAngle+'rad)';
    ty = e.touches[0].clientY;
  }, {passive: false});
}

/* ================================================================
   CURSOR
   ================================================================ */
function initCursor(){
  var cx = window.innerWidth/2, cy = window.innerHeight/2;
  var tx = cx, ty = cy;
  document.addEventListener('mousemove', function(e){ tx = e.clientX; ty = e.clientY; });
  var links = document.querySelectorAll('a, button');
  for(var i = 0; i < links.length; i++){
    links[i].addEventListener('mouseenter', function(){ $CR.classList.add('hover-btn'); });
    links[i].addEventListener('mouseleave', function(){ $CR.classList.remove('hover-btn'); });
  }
  function tick(){
    cx += (tx - cx) * 0.2;
    cy += (ty - cy) * 0.2;
    $CR.style.left = cx + 'px';
    $CR.style.top = cy + 'px';
    requestAnimationFrame(tick);
  }
  tick();
}

/* ================================================================
   NAV
   ================================================================ */
function initNav(){
  var links = document.querySelectorAll('.nav-filter');
  for(var i = 0; i < links.length; i++){
    links[i].addEventListener('click', function(e){
      e.preventDefault();
      for(var j = 0; j < links.length; j++) links[j].classList.remove('active');
      this.classList.add('active');
      currentArtist = this.dataset.artist;
      loadData(currentArtist === 'all' ? null : currentArtist);
    });
  }
}

/* ================================================================
   DATA LOADER — 核心修复: 直接用绝对路径, 加详细错误日志
   ================================================================ */
function loadData(artist){
  console.log('[Data] 开始加载, artist='+(artist||'all'));

  Promise.all([
    API.dashboard(),
    API.countdown(artist),
    API.prices(artist)
  ]).then(function(results){
    var dbData = results[0];
    var cdData = results[1];
    var prices = results[2];

    console.log('[Data] 收到: dashboard='+(dbData?'ok':'null')+' countdown='+(cdData?'ok':'null')+' prices='+(prices?prices.length:0)+'条');

    allConcerts = prices;
    buildCarousel(prices);
    buildDB(dbData);
    buildNI(prices.length > 0 ? prices[0] : null);
    if(cdData && cdData.concert && cdData.concert.date){
      startCD(cdData.concert.date);
    }

    // Update mini countdowns
    var minis = document.querySelectorAll('.countdown-mini');
    for(var i = 0; i < minis.length; i++){
      var t = minis[i].dataset.target;
      if(t) updateMiniCD(minis[i].closest('.concert-card'), t);
    }

    console.log('[Data] ✅ 加载完成 — ' + prices.length + ' 场演唱会');
  }).catch(function(err){
    console.error('[Data] ❌ 加载失败:', err.message, err);
    $NI.innerHTML = '<div style="color:var(--red);font-size:12px">⚠ 数据连接失败 — 请确认已执行 npm start<br><small>错误: '+err.message+'</small></div>';
    // Retry once
    setTimeout(function(){ console.log('[Data] 重试中...'); loadData(artist); }, 3000);
  });
}

/* ================================================================
   BOOT — 全模块隔离启动
   ================================================================ */
console.log('🚀 星空Live情报站 v4 · THREE='+(threeOk?'Y':'N')+' GSAP='+(gsapOk?'Y':'N'));

try { initThreeScene(); console.log('[Boot] 3D场景 ✅'); } catch(e){ console.error('[Boot] 3D失败:', e.message); }
try { initScroll();     console.log('[Boot] 滚轮交互 ✅'); } catch(e){ console.error('[Boot] 滚轮失败:', e.message); }
try { initCursor();     console.log('[Boot] 自定义光标 ✅'); } catch(e){ console.error('[Boot] 光标失败:', e.message); }
try { initNav();        console.log('[Boot] 导航筛选 ✅'); } catch(e){ console.error('[Boot] 导航失败:', e.message); }
try { loadData(null);   } catch(e){ console.error('[Boot] 数据启动失败:', e.message); }

// Periodic refresh
setInterval(function(){
  if(allConcerts.length === 0) return;
  API.prices(currentArtist === 'all' ? null : currentArtist).then(function(prices){
    allConcerts = prices;
    buildCarousel(prices);
  }).catch(function(){});
}, 60000);

setInterval(function(){
  var cards = document.querySelectorAll('.concert-card.flipped .countdown-mini');
  for(var i = 0; i < cards.length; i++){
    var t = cards[i].dataset.target;
    if(t) updateMiniCD(cards[i].closest('.concert-card'), t);
  }
}, 30000);

})();
</script>
