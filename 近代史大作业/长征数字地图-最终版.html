<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长征数字地图 — 纪念长征胜利九十周年</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #060b14;
      --bg-panel: rgba(10, 22, 40, 0.92);
      --border-panel: rgba(0, 180, 255, 0.3);
      --accent: #00b4d8;
      --cyan: #00e5ff;
      --warn: #ff6b35;
      --gold: #ffd166;
      --text: #c8d6e5;
      --text-dim: #7a8ba0;
      --route1: #ff4d6a;
      --route2: #ffb347;
      --route4: #4ecb71;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-deep);
      height: 100vh; width: 100vw;
      display: flex; flex-direction: column; overflow: hidden;
      user-select: none;
    }

    /* ===== 整体布局（Flex 列，不写死高度） ===== */
    #dashboard {
      flex: 1 1 0; min-height: 0;
      display: flex; flex-direction: column;
      width: 100%;
      gap: 10px; padding: 10px;
    }

    /* ===== 顶部状态栏 ===== */
    #topBar {
      flex: 0 0 auto; min-height: 56px;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 8px 20px;
      background: var(--bg-panel);
      border: 1px solid var(--border-panel);
      border-radius: 8px;
      backdrop-filter: blur(10px);
    }
    #topBar .title {
      font-size: 1.3em;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #topBar .title .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--cyan); box-shadow: 0 0 12px var(--cyan);
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    .stat-badges { display: flex; gap: 28px; }
    .stat-badge { text-align: center; }
    .stat-badge .val {
      font-size: 1.6em; font-weight: 700; color: var(--cyan);
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    }
    .stat-badge .lbl { font-size: 0.7em; color: var(--text-dim); letter-spacing: 2px; }

    /* ===== 面板通用 ===== */
    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border-panel);
      border-radius: 8px;
      padding: 14px;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-title {
      font-size: 0.72em; color: var(--text-dim); letter-spacing: 3px;
      margin-bottom: 10px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .panel-title::before { content: ''; display: inline-block; width: 3px; height: 12px; background: var(--accent); border-radius: 2px; }

    /* ===== 标签切换 ===== */
    .tab-bar {
      display: flex; gap: 4px; margin-bottom: 10px; flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 8px;
    }
    .tab-btn {
      padding: 5px 12px; border-radius: 4px; font-size: 0.72em; cursor: pointer;
      color: var(--text-dim); border: 1px solid transparent; background: transparent;
      transition: all 0.2s; font-family: inherit; white-space: nowrap;
    }
    .tab-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
    .tab-btn.active { color: var(--cyan); border-color: var(--accent); background: rgba(0,180,216,0.08); }
    .tab-content { display: none; flex: 1; overflow: hidden; min-height: 0; }
    .tab-content.active { display: flex; flex-direction: column; }

    /* ===== 顶部双行布局 ===== */
    .top-row-1 {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; flex-wrap: wrap; gap: 8px;
    }
    .top-row-2 {
      display: flex; align-items: center; gap: 6px;
      width: 100%; flex-wrap: wrap;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 8px; margin-top: 6px;
    }

    /* 弹窗触发按钮 */
    .modal-trigger {
      padding: 6px 14px; border-radius: 20px; font-size: 0.72em; cursor: pointer;
      color: var(--text); border: 1px solid var(--border-panel);
      background: rgba(0,180,216,0.06); font-family: inherit;
      transition: all 0.25s; white-space: nowrap;
      letter-spacing: 1px;
    }
    .modal-trigger:hover {
      color: #fff; border-color: var(--cyan);
      background: rgba(0,229,255,0.12);
      box-shadow: 0 0 16px rgba(0,180,216,0.25);
      transform: translateY(-1px);
    }
    .modal-trigger:active { transform: scale(0.96); }

    /* 地图图例 */
    .map-legend { display: flex; gap: 14px; align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.68em; color: var(--text-dim); }
    .legend-line { width: 20px; height: 3px; border-radius: 2px; }
    .legend-army1 { background: var(--route1); }
    .legend-army2 { background: var(--route2); }
    .legend-army4 { background: var(--route4); }

    /* ===== 地图 ===== */
    #mapWrap {
      flex: 1; min-width: 0;
      position: relative; border-radius: 8px; overflow: hidden;
      border: 1px solid var(--border-panel);
    }
    #mapContainer { width: 100%; height: 100%; }
    #mapWrap::after {
      content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 999;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,180,216,0.015) 2px, rgba(0,180,216,0.015) 4px);
      border-radius: 8px;
    }

    .tech-map .leaflet-tile {
      filter: grayscale(0.8) brightness(0.45) sepia(0.2) hue-rotate(150deg) saturate(1.3);
    }
    .tech-map .leaflet-container { background: #060b14; }
    .tech-map .leaflet-control-zoom a {
      background: rgba(10,22,40,0.9) !important; color: var(--cyan) !important;
      border: 1px solid var(--border-panel) !important; border-radius: 4px !important;
    }
    .tech-map .leaflet-control-zoom a:hover { background: var(--accent) !important; color: #fff !important; }
    .tech-map .leaflet-control-attribution { background: rgba(10,22,40,0.8) !important; color: rgba(255,255,255,0.3) !important; font-size: 9px !important; }
    .tech-map .leaflet-control-attribution a { color: rgba(255,255,255,0.4) !important; }
    .tech-map .leaflet-popup-content-wrapper {
      background: rgba(10,22,40,0.95) !important; border: 1px solid var(--border-panel) !important;
      border-radius: 6px !important; color: var(--text) !important; box-shadow: 0 4px 20px rgba(0,0,0,0.6) !important;
      max-width: 320px !important;
    }
    .tech-map .leaflet-popup-tip { background: rgba(10,22,40,0.95) !important; }
    .tech-map .leaflet-popup-content { font-family: inherit !important; font-size: 12px; margin: 10px 14px !important; line-height: 1.7; }

    .route-legend {
      position: absolute; bottom: 14px; left: 14px; z-index: 1000;
      display: flex; gap: 14px; background: var(--bg-panel);
      border: 1px solid var(--border-panel); border-radius: 6px;
      padding: 7px 12px; font-size: 0.7em; pointer-events: none;
    }
    .route-legend .item { display: flex; align-items: center; gap: 5px; color: var(--text); }
    .route-legend .swatch { width: 22px; height: 3px; border-radius: 2px; }

    /* 重走长征路按钮 */
    .tour-btn {
      position: absolute; top: 14px; right: 14px; z-index: 1000;
      display: flex; align-items: center; gap: 8px;
      padding: 9px 18px;
      background: linear-gradient(135deg, rgba(255,77,106,0.85), rgba(196,30,58,0.85));
      border: 1px solid rgba(255,255,255,0.3); border-radius: 25px;
      color: #fff; font-size: 0.8em; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all 0.3s; letter-spacing: 1px;
    }
    .tour-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,77,106,0.5); }
    .tour-btn.playing { background: linear-gradient(135deg, rgba(78,203,113,0.85), rgba(40,150,80,0.85)); animation: tourPulse 1s infinite; }
    .tour-btn .tour-icon { font-size: 1.1em; }
    @keyframes tourPulse { 0%,100%{box-shadow:0 0 10px rgba(78,203,113,0.3);} 50%{box-shadow:0 0 25px rgba(78,203,113,0.7);} }

    .tour-progress {
      position: absolute; top: 56px; right: 14px; z-index: 1000;
      background: var(--bg-panel); border: 1px solid var(--border-panel);
      border-radius: 8px; padding: 8px 14px;
      font-size: 0.72em; color: var(--text);
      display: none; pointer-events: none;
    }
    .tour-progress.active { display: block; }
    .tour-progress .tp-bar {
      width: 100%; height: 3px; background: rgba(255,255,255,0.1);
      border-radius: 2px; margin-top: 6px;
    }
    .tour-progress .tp-fill {
      height: 100%; background: var(--cyan); border-radius: 2px;
      transition: width 0.3s;
    }

    @keyframes nodePulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(1.4);} }

    /* 通用卡片（底部面板 + 弹窗共用） */
    .story-card-sm {
      padding: 10px 12px; margin-bottom: 6px; border-radius: 6px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer; transition: all 0.2s;
    }
    .story-card-sm:hover { border-color: var(--warn); background: rgba(255,107,53,0.05); }
    .story-card-sm .st-title { font-size: 0.82em; color: var(--gold); font-weight: 600; margin-bottom: 3px; }
    .story-card-sm .st-desc { font-size: 0.68em; color: var(--text-dim); line-height: 1.6; display: none; }
    .story-card-sm.expanded .st-desc { display: block; }

    /* ===== 全局弹窗 ===== */
    .g-modal {
      position: fixed; inset: 0; z-index: 10000;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      animation: modalFadeIn 0.25s ease;
    }
    .g-modal.show { display: flex; }
    @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes modalSlideUp { from { opacity: 0; transform: translateY(30px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }

    .g-modal-card {
      background: var(--bg-panel);
      border: 1px solid var(--border-panel);
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(0,180,216,0.2), 0 20px 60px rgba(0,0,0,0.6);
      max-width: 720px; width: 92vw; max-height: 82vh;
      display: flex; flex-direction: column;
      animation: modalSlideUp 0.3s ease;
      position: relative;
    }
    .g-modal-card::before {
      content: ''; position: absolute; inset: -1px; border-radius: 12px; z-index: -1;
      background: linear-gradient(135deg, var(--cyan), transparent 40%, transparent 60%, var(--accent));
      opacity: 0.4; pointer-events: none;
    }

    .g-modal-close {
      position: absolute; top: 10px; right: 14px; z-index: 10;
      width: 34px; height: 34px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.4);
      color: var(--text); font-size: 1.2em; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; font-family: inherit; line-height: 1;
      backdrop-filter: blur(4px);
    }
    .g-modal-close:hover {
      color: #fff; border-color: var(--cyan);
      background: rgba(255,77,106,0.3);
      box-shadow: 0 0 16px rgba(255,77,106,0.4);
    }

    .g-modal-body {
      flex: 1; overflow-y: auto; min-height: 0;
      padding: 24px 28px;
    }
    .g-modal-body::-webkit-scrollbar { width: 4px; }
    .g-modal-body::-webkit-scrollbar-thumb { background: var(--border-panel); border-radius: 4px; }
    .g-modal-body h2 {
      font-size: 1.1em; color: var(--cyan); margin-bottom: 16px;
      letter-spacing: 2px; display: flex; align-items: center; gap: 10px;
    }
    .g-modal-body h2::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08); }

    /* 弹窗内卡片复用 */
    .g-modal-body .figure-card,
    .g-modal-body .spirit-card-sm,
    .g-modal-body .tl-item,
    .g-modal-body .story-card-sm,
    .g-modal-body .geo-card {
      /* 继承原有样式，弹窗内微调 */
    }
    .g-modal-body .figure-list,
    .g-modal-body .tl-list,
    .g-modal-body .geo-list {
      max-height: 50vh; overflow-y: auto;
    }
    .g-modal-body .figure-list::-webkit-scrollbar,
    .g-modal-body .tl-list::-webkit-scrollbar,
    .g-modal-body .geo-list::-webkit-scrollbar { width: 3px; }
    .g-modal-body .figure-list::-webkit-scrollbar-thumb,
    .g-modal-body .tl-list::-webkit-scrollbar-thumb,
    .g-modal-body .geo-list::-webkit-scrollbar-thumb { background: var(--border-panel); border-radius: 3px; }

    .g-modal-body .strength-legend { display: flex; gap: 14px; margin-top: 8px; font-size: 0.68em; color: var(--text-dim); }
    .g-modal-body .strength-legend span { display: flex; align-items: center; gap: 4px; }
    .g-modal-body .strength-legend .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

    .g-modal-body .chart-wrap { width: 100%; height: 280px; position: relative; }
    .g-modal-body .chart-wrap canvas { width: 100% !important; height: 100% !important; }

    /* 弹窗内时间轴条目 */
    .g-modal-body .tl-item {
      padding: 10px 12px; margin-bottom: 3px; background: rgba(255,255,255,0.02);
      border: 1px solid transparent; border-radius: 5px; cursor: pointer;
      transition: all 0.2s; border-left: 3px solid transparent; position: relative;
    }
    .g-modal-body .tl-item:hover { border-color: var(--border-panel); border-left-color: var(--accent); background: rgba(10,40,60,0.6); }
    .g-modal-body .tl-item .tl-date { font-size: 0.64em; color: var(--accent); font-family: 'SF Mono','Cascadia Code','Consolas',monospace; margin-bottom: 2px; }
    .g-modal-body .tl-item .tl-title { font-size: 0.82em; color: #fff; font-weight: 600; margin-bottom: 1px; }
    .g-modal-body .tl-item .tl-loc { font-size: 0.68em; color: var(--text-dim); }
    .g-modal-body .tl-army-dot { position: absolute; top: 12px; right: 12px; width: 7px; height: 7px; border-radius: 50%; }

    /* 弹窗内故事卡片 */
    .g-modal-body .story-card-sm {
      padding: 10px 12px; margin-bottom: 6px; border-radius: 6px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer; transition: all 0.2s;
    }
    .g-modal-body .story-card-sm:hover { border-color: var(--warn); background: rgba(255,107,53,0.05); }
    .g-modal-body .story-card-sm .st-title { font-size: 0.85em; color: var(--gold); font-weight: 600; margin-bottom: 3px; }
    .g-modal-body .story-card-sm .st-desc { font-size: 0.72em; color: var(--text-dim); line-height: 1.7; display: none; }
    .g-modal-body .story-card-sm.expanded .st-desc { display: block; }

    /* 弹窗内人物卡片 */
    .g-modal-body .figure-card {
      padding: 10px 12px; margin-bottom: 6px; border-radius: 6px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      cursor: pointer; transition: all 0.2s;
    }
    .g-modal-body .figure-card:hover { border-color: var(--border-panel); background: rgba(0,180,216,0.05); }
    .g-modal-body .figure-card .fig-name { font-size: 0.85em; color: #fff; font-weight: 600; margin-bottom: 2px; }
    .g-modal-body .figure-card .fig-role { font-size: 0.68em; color: var(--accent); margin-bottom: 4px; }
    .g-modal-body .figure-card .fig-desc { font-size: 0.72em; color: var(--text-dim); line-height: 1.7; display: none; }
    .g-modal-body .figure-card.expanded .fig-desc { display: block; }

    /* 弹窗内精神卡片网格 */
    .g-modal-body .spirit-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    }
    .g-modal-body .spirit-card-sm {
      padding: 16px 12px; border-radius: 8px; text-align: center;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.2s;
    }
    .g-modal-body .spirit-card-sm:hover { border-color: var(--gold); transform: translateY(-2px); }
    .g-modal-body .spirit-card-sm .icon { font-size: 2em; margin-bottom: 6px; }
    .g-modal-body .spirit-card-sm h4 { color: var(--gold); font-size: 0.82em; margin-bottom: 4px; }
    .g-modal-body .spirit-card-sm p { color: var(--text-dim); font-size: 0.68em; line-height: 1.6; }

    /* 弹窗内地理卡片 */
    .g-modal-body .geo-card {
      padding: 10px 12px; margin-bottom: 6px; border-radius: 6px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    }
    .g-modal-body .geo-card .geo-name { font-size: 0.85em; color: #fff; font-weight: 600; margin-bottom: 3px; }
    .g-modal-body .geo-card .geo-info { font-size: 0.72em; color: var(--text-dim); line-height: 1.7; }
    .g-modal-body .geo-card .geo-impact { font-size: 0.68em; color: var(--warn); margin-top: 4px; }

    /* ===== 拖拽分隔条 ===== */
    #resizeHandle {
      flex: 0 0 auto; height: 8px; cursor: row-resize;
      background: transparent;
      position: relative;
      z-index: 100;
    }
    #resizeHandle::after {
      content: '';
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 60px; height: 4px;
      background: var(--border-panel); border-radius: 2px;
      transition: all 0.2s;
    }
    #resizeHandle:hover::after {
      background: var(--accent); width: 100px;
      box-shadow: 0 0 10px rgba(0,180,216,0.5);
    }
    #resizeHandle:active::after {
      background: var(--cyan); width: 120px;
    }

    /* ===== 底部 ===== */
    #bottomPanel {
      flex: 0 0 auto; height: 300px; min-height: 0;
      display: flex; flex-direction: column; gap: 0;
      overflow: hidden;
      background: var(--bg-panel);
      border: 1px solid var(--border-panel);
      border-radius: 8px;
    }
    /* 底部 Tab 栏 */
    .bottom-tabs {
      display: flex; gap: 0; flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.2);
    }
    .bottom-tab {
      flex: 1; padding: 9px 12px; text-align: center; cursor: pointer;
      font-size: 0.72em; color: var(--text-dim); border: none;
      background: transparent; font-family: inherit;
      border-bottom: 2px solid transparent;
      transition: all 0.2s; white-space: nowrap;
    }
    .bottom-tab:hover { color: #fff; background: rgba(255,255,255,0.03); }
    .bottom-tab.active { color: var(--cyan); border-bottom-color: var(--cyan); background: rgba(0,180,216,0.06); }
    .bottom-tab .tb-icon { font-size: 1.2em; display: block; margin-bottom: 2px; }

    /* 底部内容区 */
    .bottom-content {
      flex: 1; overflow-y: auto; overflow-x: hidden; min-height: 0;
      padding: 12px 16px; position: relative;
    }
    .bottom-content::-webkit-scrollbar { width: 4px; }
    .bottom-content::-webkit-scrollbar-thumb { background: var(--border-panel); border-radius: 4px; }
    .bottom-pane { display: none; height: 100%; min-height: 0; }
    .bottom-pane.active { display: flex; flex-direction: column; }
    .bottom-pane > * { flex: 1; min-height: 0; }
    #bottomPanel .panel { flex: 1; }

    #elevationChart { width: 100%; height: 100%; }

    /* 答题 */
    .quiz-wrap { display: flex; flex-direction: column; gap: 8px; justify-content: center; flex: 1; overflow-y: auto; min-height: 0; }
    .quiz-q { font-size: 0.85em; color: #fff; font-weight: 600; text-align: center; }
    .quiz-opts { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .quiz-opt {
      padding: 7px 16px; border-radius: 20px; font-size: 0.75em; cursor: pointer;
      border: 1px solid var(--border-panel); background: transparent; color: var(--text);
      transition: all 0.2s; font-family: inherit;
    }
    .quiz-opt:hover { border-color: var(--accent); color: #fff; }
    .quiz-opt.correct { background: rgba(78,203,113,0.3); border-color: #4ecb71; color: #4ecb71; }
    .quiz-opt.wrong { background: rgba(255,77,106,0.3); border-color: #ff4d6a; color: #ff4d6a; }
    .quiz-fb { text-align: center; font-size: 0.75em; min-height: 20px; }
    .quiz-score { text-align: center; font-size: 0.72em; color: var(--text-dim); }

    /* ===== 响应式 ===== */
    @media (max-width: 1200px) {
      #dashboard { gap: 6px; padding: 6px; }
      #topBar { min-height: auto; padding: 8px 12px; }
      #topBar .title { font-size: 0.9em; }
      .stat-badges { gap: 10px; }
      .stat-badge .val { font-size: 1em; }
      .modal-trigger { font-size: 0.65em; padding: 5px 10px; }
      #mapWrap { min-height: 300px; }
      #bottomPanel { height: auto; max-height: 350px; }

        desc:'由于第五次反"围剿"的失败，中央红军被迫实行战略转移。1934年10月，8.6万余名红军将士从江西瑞金、于都等地出发，开始了举世闻名的长征。于都河畔，乡亲们含泪送别，军民鱼水情深。' },
      { id:'yudu',      lat:25.95, lng:115.41, date:'1934.10', title:'于都送别', loc:'江西于都', army:1, type:'minor', elev:150,

      { id:'xiangjiang',lat:25.93, lng:111.07, date:'1934.11-12', title:'湘江战役', loc:'广西全州·兴安', army:1, type:'battle', elev:180,
        desc:'长征途中最惨烈的一战。红军在湘江之畔与国民党军展开殊死搏斗，战斗持续五天五夜。经此一战，红军从8.6万人锐减至3万余人，鲜血染红了湘江。红三十四师师长陈树湘被俘后，从伤口处掏出肠子用力绞断，壮烈牺牲，年仅29岁。' },
      { id:'zunyi',     lat:27.72, lng:106.93, date:'1935.01', title:'遵义会议', loc:'贵州遵义', army:1, type:'major', elev:900,

      { id:'zhaxi',     lat:27.85, lng:105.05, date:'1935.02', title:'扎西会议', loc:'云南威信·扎西', army:1, type:'major', elev:1100,
        desc:'遵义会议后，中央红军转战至云南扎西地区，在此召开了扎西会议。会议进一步落实了遵义会议决议，完成了党内领导权的交接，决定由张闻天代替博古负总责。会议还决定对部队进行精简整编，大大提高了我军的机动性和战斗力。' },
      { id:'chishui',   lat:28.59, lng:105.69, date:'1935.01-04', title:'四渡赤水', loc:'贵州·四川·云南交界', army:1, type:'battle', elev:400,
        desc:'毛泽东军事指挥艺术的巅峰之作。红军在赤水河两岸声东击西，巧妙穿插于数十万敌军之间，四个月间四次渡过赤水河。美国作家索尔兹伯里称其为"长征中最光彩神奇的篇章"，是运动战的经典范例。' },
      { id:'jinsha',    lat:26.30, lng:102.00, date:'1935.05', title:'巧渡金沙江', loc:'云南皎平渡', army:1, type:'battle', elev:900,
        desc:'中央红军在云南皎平渡不费一枪一弹缴获敌人渡船，经过九天九夜的奋力摆渡，3万余名红军将士全部渡过金沙江，成功甩开了数十万追兵，取得了战略转移中具有决定意义的胜利。' },
      { id:'daduhe',    lat:29.23, lng:102.28, date:'1935.05', title:'强渡大渡河', loc:'四川安顺场', army:1, type:'battle', elev:1100,

      { id:'maogong',   lat:31.00, lng:102.30, date:'1935.06', title:'懋功会师', loc:'四川懋功（今小金）', army:0, type:'meeting', elev:2800,

      { id:'ruoergai',  lat:33.58, lng:102.96, date:'1935.08', title:'穿越草地', loc:'四川若尔盖', army:1, type:'major', elev:3500,
        desc:'红军走进了纵横数百里的茫茫沼泽草地，天气变幻莫测，时而大雨倾盆，时而冰雹袭来。野菜、草根、皮带、马鞍都成了充饥之物。但红军没有被困难征服，凭借钢铁意志走出了这片"死亡陷阱"。' },
      { id:'lazikou',   lat:34.10, lng:103.90, date:'1935.09', title:'夺取天险腊子口', loc:'甘肃迭部', army:1, type:'battle', elev:2600,

    // 地理环境数据
    var geoData = [

      { name:'云贵高原', type:'高原', elev:'1000-2500m', climate:'高原山地气候', impact:'云贵高原地形崎岖，道路稀少，山高谷深。红军在此进行了四渡赤水、巧渡金沙江等经典战役。高原的复杂地形为红军机动作战提供了有利条件，但也增加了行军难度和物资补给困难。' },

    // ==========================================
    // 4. 地图初始化

      minZoom: 4, maxZoom: 11

    L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {

    }).addTo(map);

    // 绘制路线
    function addRoute(coords, color, dash) {
      L.polyline(coords, { color:color, weight:8, opacity:0.2, smoothFactor:1, interactive:false }).addTo(map);
      L.polyline(coords, { color:color, weight:3, opacity:0.85, smoothFactor:1, dashArray:dash||null, lineCap:'round', lineJoin:'round' }).addTo(map);
    }
    addRoute(route1, '#ff4d6a', null);
    addRoute(route2, '#ffb347', '8 5');
    addRoute(route4, '#4ecb71', '4 5');

    // 节点标记
    var markers = {};
    function nodeColor(n) {
      if (n.type === 'meeting') return '#ffd166';
      if (n.army === 2) return '#ffb347';
      if (n.army === 4) return '#4ecb71';
      return '#ff4d6a';
    }
    function nodeSize(n) {
      if (n.type === 'meeting' || n.type === 'start') return 16;
      if (n.type === 'battle') return 13;
      if (n.type === 'major') return 11;
      return 8;
    }

    nodes.forEach(function(n) {
      var sz = nodeSize(n), clr = nodeColor(n);
      var icon = L.divIcon({
        className: '',
        html: '<div style="width:'+(sz*2+8)+'px;height:'+(sz*2+8)+'px;position:relative;">'
          +'<div style="position:absolute;inset:0;border:2px solid '+clr+';border-radius:50%;opacity:0.5;animation:nodePulse 2s infinite;"></div>'
          +'<div style="position:absolute;inset:4px;background:'+clr+';border-radius:50%;opacity:0.8;"></div>'
          +'<div style="position:absolute;top:25%;left:25%;width:50%;height:50%;background:#fff;border-radius:50%;opacity:0.7;"></div>'
          +'</div>',
        iconSize: [sz*2+8, sz*2+8], iconAnchor: [sz+4, sz+4]
      });
      var m = L.marker([n.lat, n.lng], { icon:icon, riseOnHover:true }).addTo(map);
      m.bindTooltip('<b style="color:'+clr+'">'+n.title+'</b><br><small>'+n.date+' · '+n.loc+'</small>', { direction:'top', offset:[0,-sz-2] });
      // 详细弹窗
      m.bindPopup(
        '<div style="max-width:280px;">'
        +'<h3 style="color:'+clr+';margin:0 0 4px;font-size:14px;">'+n.title+'</h3>'
        +'<p style="color:#7a8ba0;font-size:11px;margin:0 0 6px;">'+n.date+' · '+n.loc+' | 海拔 '+n.elev+'m</p>'
        +'<p style="color:#c8d6e5;font-size:12px;line-height:1.8;margin:0;">'+n.desc+'</p>'
        +'</div>',
        { maxWidth:300, className:'' }
      );
      m.on('click', function() { flyToNode(n); });
      markers[n.id] = m;
    });

    // ==========================================
    // 5. 弹窗渲染函数
    // ==========================================
    var modalBody = document.getElementById('modalBody');
    var modal = document.getElementById('globalModal');
    var modalClose = document.getElementById('modalClose');
    var armyChartInstance = null;

    function openModal(modalId) {
      modalBody.innerHTML = '';
      switch (modalId) {
        case 'modalArmy': renderArmyChart(); break;
        case 'modalFigures': renderFigures(); break;
        case 'modalSpirit': renderSpirit(); break;
        case 'modalEvents': renderTimeline(); break;
        case 'modalStories': renderStories(); break;
        case 'modalGeo': renderGeo(); break;
      }
      modal.classList.add('show');
      document.body.style.overflow = 'hidden';
      // 兵力图需要延迟创建 Chart（canvas 需要先渲染）
      if (modalId === 'modalArmy') { setTimeout(createArmyChart, 150); }
    }

    function closeModal() {
      modal.classList.remove('show');
      document.body.style.overflow = '';
      if (armyChartInstance) { armyChartInstance.destroy(); armyChartInstance = null; }
    }

    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', function(e) {
      if (e.target === modal) closeModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    // 弹窗触发按钮
    document.querySelectorAll('.modal-trigger').forEach(function(btn) {
      btn.addEventListener('click', function() {
        openModal(btn.getAttribute('data-modal'));
      });
    });

    // ---- 5a. 兵力变化图 ----
    function renderArmyChart() {
      modalBody.innerHTML = '<h2>📊 兵力变化趋势</h2>'
        +'<div class="chart-wrap"><canvas id="armyCanvas"></canvas></div>'
        +'<div class="strength-legend">'
        +'<span><span class="dot" style="background:#ff4d6a"></span>红一方面军</span>'
        +'<span><span class="dot" style="background:#ffb347"></span>红二方面军</span>'
        +'<span><span class="dot" style="background:#4ecb71"></span>红四方面军</span>'
        +'</div>'
        +'<p style="color:var(--text-dim);font-size:0.68em;margin-top:8px;text-align:center;">湘江战役后兵力由8.6万锐减至3万 · 到达陕北时仅余7000余人</p>';
    }

    function createArmyChart() {
      var canvas = document.getElementById('armyCanvas');
      if (!canvas) return;
      if (armyChartInstance) armyChartInstance.destroy();
      armyChartInstance = new Chart(canvas, {
        type: 'line',
        data: {
          labels: ['出发','湘江后','遵义','赤水后','过草地','到达陕北'],
          datasets: [
            { label:'红一方面军', data:[86000,30000,37000,30000,15000,7000], borderColor:'#ff4d6a', backgroundColor:'rgba(255,77,106,0.1)', fill:true, tension:0.4, pointRadius:5, pointBackgroundColor:'#ff4d6a', borderWidth:2 },
            { label:'红二方面军', data:[17000,null,null,null,null,11000], borderColor:'#ffb347', backgroundColor:'rgba(255,179,71,0.08)', fill:true, tension:0.4, pointRadius:4, pointBackgroundColor:'#ffb347', borderWidth:2, borderDash:[6,3] },
            { label:'红四方面军', data:[80000,null,null,null,40000,30000], borderColor:'#4ecb71', backgroundColor:'rgba(78,203,113,0.08)', fill:true, tension:0.4, pointRadius:4, pointBackgroundColor:'#4ecb71', borderWidth:2, borderDash:[3,3] },
          ]
        },
        options: {
          responsive:true, maintainAspectRatio:false,
          plugins: {
            legend:{ display:true, labels:{ color:'#c8d6e5', font:{size:11}, usePointStyle:true, pointStyleWidth:8, padding:16 } },
            tooltip:{ backgroundColor:'rgba(10,22,40,0.95)', titleColor:'#fff', bodyColor:'#c8d6e5', borderColor:'rgba(0,180,216,0.3)', borderWidth:1,
              callbacks:{ label:function(ctx){ return ctx.dataset.label+': '+(ctx.raw?(ctx.raw/10000).toFixed(1)+'万':'—'); } } }
          },
          scales: {
            x:{ ticks:{ color:'#7a8ba0', font:{size:10} }, grid:{ color:'rgba(255,255,255,0.05)' } },
            y:{ ticks:{ color:'#7a8ba0', font:{size:9}, callback:function(v){ return (v/10000).toFixed(0)+'万'; } }, grid:{ color:'rgba(255,255,255,0.05)' }, min:0, max:100000 }
          },
          interaction:{ intersect:false, mode:'index' }
        }
      });
    }

    // ---- 5b. 关键人物 ----
    function renderFigures() {
      var html = '<h2>👤 长征关键人物</h2><div class="figure-list">';
      figures.forEach(function(f) {
        html += '<div class="figure-card" onclick="this.classList.toggle(\'expanded\')">'
          +'<div class="fig-name">'+f.name+'</div>'
          +'<div class="fig-role">'+f.role+'</div>'
          +'<div class="fig-desc">'+f.desc+'</div></div>';
      });
      html += '</div>';
      modalBody.innerHTML = html;

    function renderSpirit() {
      var html = '<h2>⭐ 长征精神内涵</h2><div class="spirit-grid">';
      spirits.forEach(function(s) {
        html += '<div class="spirit-card-sm"><div class="icon">'+s.icon+'</div><h4>'+s.title+'</h4><p>'+s.desc+'</p></div>';

    // ---- 5d. 历史事件时间轴 ----
    function renderTimeline() {
      var html = '<h2>📍 长征历史事件全览</h2><div class="tl-list">';
      nodes.forEach(function(n) {
        html += '<div class="tl-item" onclick="var n=findNodeById(\''+n.id+'\');if(n){flyToNode(n);closeModal();}">'
          +'<span class="tl-army-dot" style="background:'+nodeColor(n)+'"></span>'
          +'<div class="tl-date">'+n.date+'</div>'

      modalBody.innerHTML = html;

    function findNodeById(id) {
      for (var i = 0; i < nodes.length; i++) {
        if (nodes[i].id === id) return nodes[i];
      }
      return null;
    }

    function renderStories() {
      var html = '<h2>📖 长征感人故事</h2><div class="figure-list">';

        html += '<div class="story-card-sm" onclick="this.classList.toggle(\'expanded\')">'

    function renderQuiz() {
      if (quizIdx >= quizzes.length) {
        quizWrap.innerHTML = '<div class="quiz-q">答题完成！得分：'+quizScore+'/'+quizzes.length+'</div>'
          +'<button class="quiz-opt" onclick="location.reload()" style="margin:0 auto;display:block;">重新开始</button>';
        return;
      }
      var q = quizzes[quizIdx];
      var html = '<div class="quiz-q">📝 '+q.q+'</div><div class="quiz-opts">';
      q.opts.forEach(function(o, i) {
        html += '<button class="quiz-opt" data-idx="'+i+'">'+o+'</button>';
      });
      html += '</div><div class="quiz-fb" id="quizFb"></div><div class="quiz-score">已答 '+quizDone+'/'+quizzes.length+' 题 | 正确 '+quizScore+'</div>';
      quizWrap.innerHTML = html;

      quizWrap.querySelectorAll('.quiz-opt').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var idx = parseInt(btn.getAttribute('data-idx'));
          var fb = document.getElementById('quizFb');
          quizWrap.querySelectorAll('.quiz-opt').forEach(function(b){ b.style.pointerEvents = 'none'; });
          if (idx === q.ans) {
            btn.classList.add('correct'); fb.innerHTML = '✅ 正确！'+q.exp; fb.style.color = '#4ecb71';

          } else {
            btn.classList.add('wrong');
            quizWrap.querySelectorAll('.quiz-opt')[q.ans].classList.add('correct');
            fb.innerHTML = '❌ 错误。'+q.exp; fb.style.color = '#ff4d6a';
          }
          quizDone++;
          setTimeout(function() { quizIdx++; renderQuiz(); }, 1800);
        });
      });
    }
    renderQuiz();

    var poems = [
      { title:'七律·长征', date:'1935.10', text:'红军不怕远征难，万水千山只等闲。\n五岭逶迤腾细浪，乌蒙磅礴走泥丸。\n金沙水拍云崖暖，大渡桥横铁索寒。\n更喜岷山千里雪，三军过后尽开颜。', note:'写于中央红军即将到达陕北之际。全诗以豪迈的笔触概括了长征的艰难历程，是长征诗词的代表作。' },
      { title:'忆秦娥·娄山关', date:'1935.02', text:'西风烈，长空雁叫霜晨月。\n霜晨月，马蹄声碎，喇叭声咽。\n雄关漫道真如铁，而今迈步从头越。\n从头越，苍山如海，残阳如血。', note:'写于遵义会议后攻克娄山关之时。"雄关漫道真如铁，而今迈步从头越"成为千古名句。' },
      { title:'清平乐·六盘山', date:'1935.10', text:'天高云淡，望断南飞雁。\n不到长城非好汉，屈指行程二万。\n六盘山上高峰，红旗漫卷西风。\n今日长缨在手，何时缚住苍龙？', note:'翻越六盘山后所作。"不到长城非好汉"成为激励无数人的名句。' },
      { title:'十六字令三首', date:'1934-1935', text:'山，快马加鞭未下鞍。惊回首，离天三尺三。\n山，倒海翻江卷巨澜。奔腾急，万马战犹酣。\n山，刺破青天锷未残。天欲堕，赖以拄其间。', note:'以山为意象，描绘了长征途中的壮丽山川和红军将士的英雄气概。' },
      { title:'念奴娇·昆仑', date:'1935.10', text:'横空出世，莽昆仑，阅尽人间春色。\n飞起玉龙三百万，搅得周天寒彻。\n夏日消溶，江河横溢，人或为鱼鳖。\n千秋功罪，谁人曾与评说？', note:'借昆仑山的雄伟意象，抒发改造中国与世界的宏大抱负。' },
    ];
    var poetryList = document.getElementById('poetryList');
    poems.forEach(function(p) {
      var div = document.createElement('div');
      div.className = 'story-card-sm';
      div.innerHTML = '<div class="st-title">'+p.title+'</div><div style="font-size:0.64em;color:var(--accent);margin-bottom:4px;">'+p.date+'</div><div class="st-desc" style="white-space:pre-line;font-style:italic;">'+p.text+'</div><div class="st-desc" style="color:var(--warn);margin-top:4px;">'+p.note+'</div>';
      div.addEventListener('click', function() { div.classList.toggle('expanded'); });
      poetryList.appendChild(div);
    });

    // ==========================================
    // 12. 战役推演小游戏 — 四渡赤水
    // ==========================================
    var battleWrap = document.getElementById('battleWrap');
    var battleState = { phase:0, troops:30000, enemy:400000, morale:70, river:'赤水河', round:0 };
    var battleScenes = [
      { title:'第一渡 · 土城', text:'敌军从四面合围而来，兵力10倍于我。毛泽东决定：立即西渡赤水河，跳出包围圈！', choices:['立即西渡，甩开敌军','原地固守，等待援军','向东突围，进入湘西'], correct:0, result:['红军成功渡过赤水，甩开追兵！部队进入川南。','敌军合围完成，红军伤亡惨重，损失8000人。','东面敌军密集，突围失败，损失5000人。'], troopDelta:[0,-8000,-5000], moraleDelta:[10,-20,-15] },
      { title:'第二渡 · 太平渡', text:'敌军判断红军要北渡长江，重兵布防川南。毛泽东决定：杀个回马枪，二渡赤水，回师黔北！', choices:['回师东渡，攻克娄山关','继续北上，强行渡江','分兵两路，南北佯动'], correct:0, result:['红军攻克娄山关，再占遵义，歼敌两个师！','渡江受阻，伤亡惨重，士气大挫。','兵力分散，效果一般，勉强打开局面。'], troopDelta:[2000,-10000,-2000], moraleDelta:[20,-25,0] },
      { title:'第三渡 · 茅台', text:'敌军再次围攻遵义。毛泽东将计就计：三渡赤水，佯作北渡长江之势，诱敌向西！', choices:['大张旗鼓渡江，诱敌深入','隐蔽行动，秘密转移','原地设伏，打一个歼灭战'], correct:0, result:['敌军主力被成功吸引西进，红军主力秘密东移！','敌军未察觉，但红军也失去战机。','伏击部分成功，但未改变整体态势。'], troopDelta:[0,-3000,-1000], moraleDelta:[15,-10,5] },
      { title:'第四渡 · 二郎滩', text:'敌军主力已深入川南。毛泽东下令：四渡赤水，南渡乌江，直逼贵阳！蒋介石急调滇军回援。', choices:['南渡乌江，威逼贵阳','回头决战，消灭追兵','继续西进，深入川康'], correct:0, result:['蒋介石急调滇军，云南门户大开！红军巧渡金沙江！','敌众我寡，决战失利，损失惨重。','错失战略机遇，敌军重新部署完成。'], troopDelta:[0,-15000,-5000], moraleDelta:[25,-30,-10] },
    ];

    function renderBattle() {
      var s = battleScenes[battleState.phase];
      var html = '<div style="text-align:center;font-size:0.78em;color:var(--cyan);margin-bottom:6px;">⚔️ '+s.title+'</div>';
      html += '<div style="font-size:0.7em;color:var(--text-dim);margin-bottom:4px;">兵力: '+battleState.troops+' | 士气: '+battleState.morale+'</div>';
      html += '<div style="font-size:0.72em;color:#fff;margin-bottom:10px;line-height:1.6;">'+s.text+'</div>';
      s.choices.forEach(function(c, i) {
        html += '<button class="quiz-opt battle-opt" data-idx="'+i+'" style="display:block;width:100%;margin-bottom:4px;text-align:left;">'+c+'</button>';
      });
      html += '<div id="battleFb" style="text-align:center;font-size:0.72em;min-height:20px;margin-top:4px;"></div>';
      html += '<div style="text-align:center;font-size:0.64em;color:var(--text-dim);margin-top:2px;">第'+(battleState.phase+1)+'/'+battleScenes.length+' 渡</div>';
      battleWrap.innerHTML = html;

      battleWrap.querySelectorAll('.battle-opt').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var idx = parseInt(btn.getAttribute('data-idx'));
          var fb = document.getElementById('battleFb');
          battleWrap.querySelectorAll('.battle-opt').forEach(function(b){ b.style.pointerEvents='none'; });
          if (idx === s.correct) { btn.classList.add('correct'); fb.style.color='#4ecb71'; }
          else { btn.classList.add('wrong'); battleWrap.querySelectorAll('.battle-opt')[s.correct].classList.add('correct'); fb.style.color='#ff4d6a'; }
          battleState.troops += s.troopDelta[idx];
          battleState.morale += s.moraleDelta[idx];
          fb.innerHTML = s.result[idx]+' (兵力'+ (s.troopDelta[idx]>=0?'+':'') +s.troopDelta[idx]+' 士气'+ (s.moraleDelta[idx]>=0?'+':'') +s.moraleDelta[idx]+')';
          battleState.phase++;
          if (battleState.phase >= battleScenes.length) {
            var grade = battleState.morale >= 80 ? 'S级 · 用兵如神！🏆' : battleState.morale >= 50 ? 'A级 · 出色指挥！⭐' : 'B级 · 继续努力 📖';
            setTimeout(function() {
              battleWrap.innerHTML = '<div style="text-align:center;color:var(--gold);font-size:0.9em;font-weight:700;">推演结束</div>'
                +'<div style="text-align:center;color:var(--cyan);font-size:0.8em;margin:6px 0;">'+grade+'</div>'
                +'<div style="text-align:center;font-size:0.7em;color:var(--text-dim);">剩余兵力: '+battleState.troops+' | 士气: '+battleState.morale+'</div>'
                +'<div style="text-align:center;font-size:0.68em;color:var(--text-dim);margin-top:6px;">四渡赤水是毛泽东军事指挥艺术的巅峰之作，被美国作家索尔兹伯里誉为"长征中最光彩神奇的篇章"。</div>'
                +'<button class="quiz-opt" onclick="location.reload()" style="display:block;margin:10px auto 0;">重新推演</button>';
            }, 1500);
          } else {
            setTimeout(function() { renderBattle(); }, 1800);
          }
        });
      });
    }
    renderBattle();

    // ==========================================
    // 13. "重走长征路" 自动漫游
    // ==========================================
    var tourRunning = false;
    var tourTimer = null;
    var tourIdx = 0;
    var btnTour = document.getElementById('btnTour');
    var tourProgress = document.getElementById('tourProgress');
    var tourLabel = document.getElementById('tourLabel');
    var tourFill = document.getElementById('tourFill');

    // 漫游路线 — 按红一方面军关键节点顺序
    var tourNodes = ['ruijin','yudu','xiangjiang','zunyi','zhaxi','chishui','jinsha','daduhe','luding','jiajin','maogong','ruoergai','lazikou','hadapu','wuqi','huining'];

    function getNodeById(id) {
      for (var i = 0; i < nodes.length; i++) {
        if (nodes[i].id === id) return nodes[i];
      }
      return null;
    }

    function startTour() {
      if (tourRunning) { stopTour(); return; }
      tourRunning = true;
      tourIdx = 0;
      btnTour.innerHTML = '<span class="tour-icon">⏸</span> 停止漫游';
      btnTour.classList.add('playing');
      tourProgress.classList.add('active');
      tourNext();
    }

    function stopTour() {
      tourRunning = false;
      if (tourTimer) clearTimeout(tourTimer);
      btnTour.innerHTML = '<span class="tour-icon">▶</span> 重走长征路';
      btnTour.classList.remove('playing');
      tourProgress.classList.remove('active');
    }

    function tourNext() {
      if (!tourRunning || tourIdx >= tourNodes.length) {
        if (tourIdx >= tourNodes.length) {
          tourLabel.textContent = '长征胜利！三大主力会师！';
          tourFill.style.width = '100%';
          map.flyTo([35.70, 105.05], 7, { duration: 2 });
          setTimeout(stopTour, 2000);
        }
        return;
      }
      var n = getNodeById(tourNodes[tourIdx]);
      if (!n) { tourIdx++; tourNext(); return; }

      tourLabel.textContent = '第 '+(tourIdx+1)+'/'+tourNodes.length+' 站: '+n.title;
      tourFill.style.width = ((tourIdx/tourNodes.length)*100)+'%';

      map.flyTo([n.lat, n.lng], 8, { duration: 1.5 });
      setTimeout(function() {
        if (markers[n.id]) markers[n.id].openPopup();
      }, 1600);

      tourIdx++;
      tourTimer = setTimeout(tourNext, 3000);
    }

    btnTour.addEventListener('click', startTour);

    // ==========================================
    // 14. 底部 Tab 切换
    // ==========================================
    document.getElementById('bottomTabs').addEventListener('click', function(e) {
      var tab = e.target.closest('.bottom-tab');
      if (!tab) return;
      var paneId = tab.getAttribute('data-pane');
      // 切换 tab 样式
      document.querySelectorAll('#bottomTabs .bottom-tab').forEach(function(t){ t.classList.remove('active'); });
      tab.classList.add('active');
      // 切换面板
      document.querySelectorAll('#bottomContent .bottom-pane').forEach(function(p){ p.classList.remove('active'); });
      var pane = document.getElementById(paneId);
      if (pane) { pane.classList.add('active'); }
      // 切换到海拔图时重绘
      if (paneId === 'paneElev') { setTimeout(drawElevation, 150); }
    });

    // ==========================================
    // 15. 拖拽分隔条调整底部高度
    // ==========================================
    var resizeHandle = document.getElementById('resizeHandle');
    var bottomPanel = document.getElementById('bottomPanel');
    var isResizing = false;
    var startY = 0;
    var startBottomH = 300;

    resizeHandle.addEventListener('mousedown', function(e) {
      isResizing = true;
      startY = e.clientY;
      startBottomH = parseInt(getComputedStyle(bottomPanel).height) || 300;
      document.body.style.cursor = 'row-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
      if (!isResizing) return;
      var dy = e.clientY - startY;
      var newH = Math.max(150, Math.min(500, startBottomH - dy));
      bottomPanel.style.height = newH + 'px';
      setTimeout(drawElevation, 50);
    });

    document.addEventListener('mouseup', function() {
      if (!isResizing) return;
      isResizing = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      map.invalidateSize();
    });

    // 触摸支持
    resizeHandle.addEventListener('touchstart', function(e) {
      isResizing = true;
      startY = e.touches[0].clientY;
      startBottomH = parseInt(getComputedStyle(bottomPanel).height) || 300;
      e.preventDefault();
    });

    document.addEventListener('touchmove', function(e) {
      if (!isResizing) return;
      var dy = e.touches[0].clientY - startY;
      var newH = Math.max(150, Math.min(500, startBottomH - dy));
      bottomPanel.style.height = newH + 'px';
    });

    document.addEventListener('touchend', function() {
      if (!isResizing) return;
      isResizing = false;
      map.invalidateSize();
      setTimeout(drawElevation, 50);
    });

    // ==========================================
    // 16. 地图辅助函数
    // ==========================================
    function flyToNode(n) {
      map.flyTo([n.lat, n.lng], Math.max(map.getZoom(), 7), { duration:1.2 });
      setTimeout(function() { if (markers[n.id]) markers[n.id].openPopup(); }, 1300);
    }

    // ==========================================
    // 17. 长征精神数据（弹窗中使用）
    // ==========================================
    var spirits = [
      { icon:'🎯', title:'坚定信念', desc:'革命理想高于天。把党和人民利益放在第一位，为民族解放不惜牺牲一切。' },
      { icon:'⚔️', title:'不怕牺牲', desc:'一不怕苦、二不怕死。面对围追堵截和严酷考验毫无惧色。' },
      { icon:'🧭', title:'独立自主', desc:'实事求是闯新路。遵义会议确立正确路线，独立自主解决中国革命问题。' },
      { icon:'🤝', title:'顾全大局', desc:'团结一致向北进。各路红军互相配合、密切协同，高度革命全局观念。' },
      { icon:'💪', title:'紧密团结', desc:'军民鱼水情谊深。与人民群众同甘共苦，赢得真心拥护支持。' },
      { icon:'🌟', title:'勇往直前', desc:'革命到底志不移。无论多大困难，始终保持必胜信念。' },
    ];

    // ==========================================
    // 13. 海拔剖面图
    // ==========================================
    var elevProfile = [
      { km:0, elev:200, label:'瑞金' },{ km:600, elev:180, label:'湘江' },{ km:1200, elev:900, label:'遵义' },
      { km:1600, elev:1100, label:'扎西' },{ km:2000, elev:400, label:'赤水' },{ km:2600, elev:900, label:'金沙江' },
      { km:3200, elev:1300, label:'泸定桥' },{ km:3500, elev:4114, label:'夹金山' },{ km:3900, elev:3500, label:'草地' },
      { km:4600, elev:2600, label:'腊子口' },{ km:5000, elev:1300, label:'吴起镇' },
    ];
    function drawElevation() {
      var canvas = document.getElementById('elevationCanvas');
      var ctx2 = canvas.getContext('2d');
      var W = canvas.parentElement.clientWidth, H = canvas.parentElement.clientHeight;
      canvas.width = W * devicePixelRatio; canvas.height = H * devicePixelRatio;
      canvas.style.width = W+'px'; canvas.style.height = H+'px';
      ctx2.setTransform(1,0,0,1,0,0); ctx2.scale(devicePixelRatio, devicePixelRatio);

      var pad = { top:16, right:24, bottom:28, left:46 };
      var pw = W-pad.left-pad.right, ph = H-pad.top-pad.bottom;
      var maxElev=5000, maxKm=5500;

      ctx2.strokeStyle='rgba(255,255,255,0.06)'; ctx2.lineWidth=1;
      for (var i=0;i<=5;i++) {
        var y=pad.top+(ph/5)*i;
        ctx2.beginPath(); ctx2.moveTo(pad.left,y); ctx2.lineTo(W-pad.right,y); ctx2.stroke();
        ctx2.fillStyle='#7a8ba0'; ctx2.font='9px sans-serif'; ctx2.textAlign='right';
        ctx2.fillText((5000-i*1000)+'m', pad.left-6, y+3);
      }

      var grad=ctx2.createLinearGradient(0,pad.top,0,pad.top+ph);
      grad.addColorStop(0,'rgba(0,180,216,0.35)'); grad.addColorStop(0.4,'rgba(0,119,182,0.25)'); grad.addColorStop(1,'rgba(0,119,182,0.05)');
      ctx2.beginPath();
      elevProfile.forEach(function(pt,i) {
        var x=pad.left+(pt.km/maxKm)*pw, y=pad.top+(1-pt.elev/maxElev)*ph;
        if(i===0) ctx2.moveTo(x,y); else ctx2.lineTo(x,y);
      });
      var lx=pad.left+(elevProfile[elevProfile.length-1].km/maxKm)*pw;
      ctx2.lineTo(lx,pad.top+ph); ctx2.lineTo(pad.left,pad.top+ph); ctx2.closePath();
      ctx2.fillStyle=grad; ctx2.fill();

      ctx2.beginPath();
      elevProfile.forEach(function(pt,i) {
        var x=pad.left+(pt.km/maxKm)*pw, y=pad.top+(1-pt.elev/maxElev)*ph;
        if(i===0) ctx2.moveTo(x,y); else ctx2.lineTo(x,y);
      });
      ctx2.strokeStyle='#00e5ff'; ctx2.lineWidth=2.5; ctx2.shadowColor='#00e5ff'; ctx2.shadowBlur=8; ctx2.stroke(); ctx2.shadowBlur=0;

      elevProfile.forEach(function(pt) {
        var x=pad.left+(pt.km/maxKm)*pw, y=pad.top+(1-pt.elev/maxElev)*ph;
        ctx2.beginPath(); ctx2.arc(x,y,4,0,Math.PI*2); ctx2.fillStyle='#fff'; ctx2.fill();
        ctx2.fillStyle='#c8d6e5'; ctx2.font='bold 9px sans-serif'; ctx2.textAlign='center'; ctx2.fillText(pt.label,x,y-8);
      });
    }
    window.addEventListener('resize', function() {
      map.invalidateSize();
      drawElevation();
    });
    setTimeout(function() {
      map.invalidateSize();
      drawElevation();
    }, 300);

    // ==========================================
    // 18. 初始化
    // ==========================================
    setTimeout(function() {
      map.invalidateSize();
    }, 300);
    console.log('✅ 长征数字地图已就绪 — 覆盖教学方案全部五大维度 | Modal交互模式');
  </script>
</body>
</html>
